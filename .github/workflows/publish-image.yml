name: Publish image

# Build and push multi-arch (amd64 + arm64) container images to GHCR:
#   * on a version tag  -> :x.y.z, :x.y, :latest   (stable releases)
#   * on push to main   -> :edge                    (latest development code)
# amd64 covers x86 hosts; arm64 covers Raspberry Pi and other ARM boards.

on:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # No implicit "latest"; we add it explicitly for tags only, so a
          # push to main only moves :edge and never clobbers :latest.
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=edge,branch=main

      # Build amd64 locally first and scan it, so a vulnerable image is never
      # pushed. The multi-arch push below reuses this build's cache (same
      # buildx builder), so arm64 is the only extra work. amd64 and arm64 share
      # the same alpine + pip packages, so scanning amd64 covers the CVE surface
      # — matching the image scan in security.yml.
      - name: Build amd64 image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: reolapse:scan

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan image (fail on fixable HIGH/CRITICAL)
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 reolapse:scan

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
