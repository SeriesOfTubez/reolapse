# Copy this file to config.yaml and edit it for your setup.
# config.yaml is gitignored. Secrets belong in .env, not here — reference them
# as ${VAR} (see the password fields below and .env.example).

# ---------------------------------------------------------------------------
# Cameras
# ---------------------------------------------------------------------------
# Each camera can be reached two ways — use whichever is convenient:
#   * Through an NVR  host = NVR IP,     channel = the camera's NVR channel
#                    (one host + one credential for every camera; also needed
#                    if cameras sit on the NVR's isolated PoE network)
#   * Directly       host = camera IP,  channel = 0
#                    (no NVR dependency; also the only way to reach a lens the
#                    NVR doesn't expose, e.g. a dual-lens camera's 2nd lens)
#
# Both return the same full-resolution main-stream snapshot on current gear
# (verified on an RLN36). Some older NVRs may return a reduced-res snapshot —
# if you see that, pull that camera directly.
#
# `name` is used in folder/file names — letters, digits and dashes only.
cameras:
  - name: front-yard
    host: 192.168.1.50        # camera IP, or NVR IP
    channel: 0                # 0 talking to a camera directly; NVR channel otherwise
    username: admin
    password: "${REOLINK_PASSWORD}"
    https: true               # older firmware may only offer http (set false)
    verify_ssl: false         # Reolink ships self-signed certs; keep false for https

  # Example: a second camera pulled from the same NVR on channel 1
  # - name: back-yard
  #   host: 192.168.1.50
  #   channel: 1
  #   username: admin
  #   password: "${REOLINK_PASSWORD}"
  #   https: true
  #   verify_ssl: false

  # Example: an auto-tracking PTZ camera. Frames captured while it is away
  # from its home position are quarantined (kept, but excluded from videos).
  # Find the pan/tilt values by pointing it home and querying GetPtzCurPos.
  # - name: driveway
  #   host: 192.168.1.51
  #   channel: 0
  #   username: admin
  #   password: "${REOLINK_PASSWORD}"
  #   https: true
  #   verify_ssl: false
  #   ptz_home:
  #     channel: 0            # queried host defaults to the camera's own host;
  #     host: 192.168.1.51    # set explicitly (camera IP) if you need the tilt
  #     pan: 1071             # axis — an NVR only relays pan
  #     # tilt: 79
  #     tolerance: 10

capture:
  interval_seconds: 60        # one frame/minute -> ~48s daily video at 30 fps
  start_time: ""              # e.g. "05:30" to skip night frames; empty = all day
  end_time: ""                # e.g. "21:30". Ignored if daylight_window.enabled
  timeout_seconds: 15
  daylight_window:            # capture only around actual daylight, computed
                              # daily from sunrise/sunset instead of a fixed
                              # clock window — see the README section on IR
                              # and 24-hour timelapses for why this matters.
    enabled: false            # overrides start_time/end_time when true
    buffer_minutes: 0         # start this many minutes before sunrise, stop
                              # this many after sunset. Uses the same location
                              # as events.zip/latitude/longitude below,
                              # independent of weather_enabled/lunar_enabled.

storage:
  root: ./data                # relative paths resolve next to config.yaml
  keep_snapshots_days: 4      # prune a day's frames this many days after its
                              # daily video is built; 0 = keep frames forever

daily_video:
  fps: 30
  crf: 20                     # x264 quality; lower = better/bigger (18-23 sensible)
  deflicker_size: 10          # frames in the deflicker averaging window; 0 disables
  max_height: 1440            # downscale taller sources; 0 = keep original height
  retention_days: 0           # delete a camera's daily .mp4 this many days after
                              # its date; 0 = keep forever. Unlike snapshots, a
                              # pruned daily video is NOT re-buildable — its
                              # source frames are already gone by then too.

yearly:
  archive_frames_per_day: 24  # frames kept forever per day; the pool the yearly
                              # video is rendered from (archive more than you render)
  video_frames_per_day: 10    # 10/day x 365 @ 30 fps ~= a 2-minute year
  video_window: "08:00-16:30" # render only daylight hours; "" = whole day
  fps: 30
  crf: 20
  deflicker_size: 15          # wider window: day-to-day exposure varies more
  retention_years: 0          # delete a camera's yearly .mp4 once it's more than
                              # this many years old; 0 = keep forever. Cheap to
                              # set low: the archived frames it's built from are
                              # NEVER deleted, so `build_timelapse.py yearly
                              # --year YYYY` regenerates a pruned year any time.

# ---------------------------------------------------------------------------
# Weather & lunar event tagging (optional)
# ---------------------------------------------------------------------------
# Two independent switches — turn on either, both, or neither:
#
#   weather_enabled  Polls NWS alerts (US-only) + Open-Meteo for storm/snow/
#                    rain, triggers burst capture. REQUIRES a location: set
#                    `zip`, or `latitude`/`longitude` (required outside the
#                    US). If enabled without one, storm/snow tagging is
#                    silently skipped and a warning is logged — the web UI
#                    also flags this.
#
#   lunar_enabled    Computes real moon events locally with Skyfield: full,
#                    blue, and harvest moon, plus blood moon (total lunar
#                    eclipse) and partial lunar eclipse. NO location required
#                    — moon phase is the same instant everywhere on Earth.
#                    A location, if set, is used to only tag an eclipse when
#                    the Moon was actually above your horizon (eclipses are
#                    geocentric events, but visibility is not — a total
#                    eclipse invisible from the southern hemisphere, say,
#                    still fires the phase math without one). First use
#                    downloads a ~17 MB ephemeris into <storage.root>/ephemeris.
#
#   season_enabled   Tags every frame and video with the current astronomical
#                    season (spring/summer/fall/winter). NO location required
#                    — defaults to Northern Hemisphere; set a location to get
#                    the correct season south of the equator. Cheap and
#                    useful for a project literally about the changing
#                    seasons — reasonable to leave on.
#
# Active tags are logged (data/conditions/) and embedded in each frame; video
# metadata gets the season too (readable with ffprobe/exiftool).
events:
  weather_enabled: false
  lunar_enabled: false
  season_enabled: false
  zip: "12345"                # US ZIP, resolved to lat/lon via zippopotam.us
                              # (free, no key). Or set latitude/longitude
                              # below to skip the lookup.
  # latitude: 0.0
  # longitude: 0.0
  poll_minutes: 5
  burst_tags: [storm, snow]   # tags that switch capture to the burst interval
  burst_interval_seconds: 10  # use a value that divides interval_seconds
  # force_tags: [storm]       # testing hook: pretend these are always active

events_video:
  tags: [storm, snow]         # render a clip per active span of these tags
  min_frames: 30
  fps: 30
  crf: 20
  deflicker_size: 0           # default for any tag not in deflicker_by_tag
                              # below. Off by default: deflicker would smooth
                              # away lightning flashes in storm clips.
  # deflicker_by_tag:         # per-tag override — e.g. snow has no lightning
  #   snow: 10                # to protect, so smoothing exposure flicker is
  #                           # safe (and often looks better) there
  retention_days: 0           # delete an event clip this many days after its
                              # date (parsed from the filename); 0 = forever

webapp:
  host: 0.0.0.0
  port: 8080
