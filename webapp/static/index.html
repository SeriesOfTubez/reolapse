<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReoLapse</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml">
<style>
  :root {
    /* Surfaces */
    --surface-0: #14161a;
    --surface-1: #1d2026;
    --surface-2: #24282f;
    /* Borders */
    --border: #30343c;
    --border-strong: #3d424c;
    /* Text */
    --text-1: #e8eaed;
    --text-2: #9aa0a8;
    --text-3: #6b7280;
    /* Brand accent, from the logo's sun */
    --accent: #f2a94e;
    --accent-strong: #f79a3e;
    --accent-contrast: #14161a;
    --accent-quiet: rgba(242, 169, 78, 0.14);
    /* Typography */
    --font-sans: system-ui, "Segoe UI", Roboto, sans-serif;
    --fs-xs: 12px;
    --fs-sm: 13px;
    --fs-base: 15px;
    --fs-lg: 17px;
    --lh: 1.5;
    --fw-regular: 400;
    --fw-medium: 500;
    --fw-semibold: 600;
    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    /* Radii */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 10px;
    --radius-pill: 999px;
    /* Motion & layout */
    --transition: 120ms ease;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--surface-0);
    color: var(--text-1);
    font: var(--fs-base)/var(--lh) var(--font-sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: var(--space-3) var(--space-5);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .brand { display: flex; align-items: center; gap: var(--space-2); }
  .brand img { width: 26px; height: 26px; display: block; }
  .brand h1 {
    margin: 0;
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
    letter-spacing: 0.2px;
  }

  .pills { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .pill {
    padding: var(--space-1) var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), background var(--transition), border-color var(--transition);
  }
  .pill:hover { color: var(--text-1); border-color: var(--border-strong); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
    font-weight: var(--fw-medium);
  }

  main { flex: 1; display: flex; min-height: 0; }

  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: var(--space-2);
  }
  .vid-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
  }
  .vid-item:hover { background: var(--surface-1); }
  .vid-item.active { background: var(--accent-quiet); color: var(--accent); }
  .vid-item .size { color: var(--text-2); font-size: var(--fs-xs); white-space: nowrap; }

  .year-group, .month-group { border: none; }
  .year-group > summary, .month-group > summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    list-style: none;
    color: var(--text-1);
    font-weight: var(--fw-medium);
  }
  .year-group > summary::-webkit-details-marker,
  .month-group > summary::-webkit-details-marker { display: none; }
  .year-group > summary:hover, .month-group > summary:hover { background: var(--surface-1); }
  .year-group > summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: var(--space-2);
    color: var(--text-3);
    transition: transform var(--transition);
  }
  .year-group[open] > summary::before { transform: rotate(90deg); }
  .month-group { margin-left: var(--space-2); }
  .month-group > summary {
    font-size: var(--fs-sm);
    font-weight: var(--fw-regular);
    color: var(--text-2);
  }
  .month-group > summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: var(--space-2);
    font-size: var(--fs-xs);
    transition: transform var(--transition);
  }
  .month-group[open] > summary::before { transform: rotate(90deg); }
  .month-group .vid-item { margin-left: var(--space-4); }
  .group-count { color: var(--text-3); font-size: var(--fs-xs); font-weight: var(--fw-regular); }

  #player-area {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* flex-start, not center: with overflow-y:auto, justify-content:center
       pushes overflowing content's start edge out of scroll range - tall
       views (Config, Storage) would have their top clipped and unreachable
       by scrolling. Content shorter than the viewport (the video player) is
       centered instead via margin:auto on .video-wrap below, which doesn't
       have that bug. */
    justify-content: flex-start;
    padding: var(--space-5);
    overflow-y: auto;
  }
  .video-wrap { margin: auto 0; display: flex; flex-direction: column; align-items: center; }
  #empty { margin: auto; }
  video {
    max-width: 100%;
    max-height: calc(100% - 60px);
    border-radius: var(--radius-lg);
    background: #000;
  }

  #controls {
    margin-top: var(--space-3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    flex-wrap: wrap;
  }
  #controls .label { color: var(--text-2); font-size: var(--fs-sm); }
  .speed {
    padding: var(--space-1) var(--space-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-xs)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
  }
  .speed:hover { color: var(--text-1); border-color: var(--border-strong); }
  .speed.active { color: var(--accent); border-color: var(--accent); }
  a.dl { color: var(--text-2); font-size: var(--fs-sm); text-decoration: none; }
  a.dl:hover { color: var(--accent); }

  #empty { color: var(--text-2); text-align: center; padding: var(--space-6); line-height: 1.6; }
  #empty code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
  }

  #warnings:empty { display: none; }
  .warning {
    padding: var(--space-2) var(--space-5);
    background: var(--accent-quiet);
    color: var(--accent);
    font-size: var(--fs-sm);
    border-bottom: 1px solid var(--border);
  }

  #storage-view { width: 100%; max-width: 760px; }
  .forecast-banner {
    margin: var(--space-4) 0;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface-1);
  }
  .forecast-title { font-size: 16px; font-weight: var(--fw-semibold); margin-bottom: var(--space-1); }
  .forecast-detail { color: var(--text-2); font-size: var(--fs-sm); }
  .forecast-runway { border-color: var(--accent); }
  .forecast-runway .forecast-title { color: var(--accent); }
  .forecast-excess { border-color: #4caf7d; }
  .forecast-excess .forecast-title { color: #4caf7d; }
  .forecast-shortage { border-color: #e5534b; }
  .forecast-shortage .forecast-title { color: #e5534b; }
  .retention-line { color: var(--text-2); font-size: var(--fs-xs); margin-bottom: var(--space-2); }
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: var(--space-3);
  }
  .stat-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
  }
  .stat-label { color: var(--text-2); font-size: var(--fs-xs); }
  .stat-value {
    font-size: 22px;
    font-weight: var(--fw-semibold);
    margin: var(--space-1) 0;
  }
  .stat-sub { color: var(--text-2); font-size: var(--fs-xs); }
  .stat-projection {
    margin: var(--space-4) 0;
    color: var(--text-2);
    font-size: var(--fs-sm);
  }
  .stat-projection strong { color: var(--text-1); font-weight: var(--fw-medium); }
  .stat-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
  .stat-table th, .stat-table td {
    text-align: left;
    padding: var(--space-2) var(--space-3);
    border-bottom: 1px solid var(--border);
  }
  .stat-table th { color: var(--text-2); font-weight: var(--fw-regular); }
  .stat-footnote {
    margin-top: var(--space-3);
    color: var(--text-3);
    font-size: var(--fs-xs);
  }

  #cfg-view { width: 100%; max-width: 720px; padding-bottom: 80px; }
  .cfg-section {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    margin-bottom: var(--space-4);
  }
  .cfg-section h3 {
    margin: 0 0 var(--space-3) 0;
    font-size: var(--fs-base);
    font-weight: var(--fw-semibold);
  }
  .cfg-section .cfg-hint-block {
    color: var(--text-2);
    font-size: var(--fs-xs);
    margin-bottom: var(--space-3);
    line-height: 1.5;
  }
  .cfg-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    padding: var(--space-2) 0;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row:last-child { border-bottom: none; }
  .cfg-row.cfg-row-col { flex-direction: column; align-items: stretch; gap: var(--space-1); }
  .cfg-label { font-size: var(--fs-sm); color: var(--text-1); flex-shrink: 0; }
  .cfg-hint { display: block; color: var(--text-3); font-size: var(--fs-xs); margin-top: 2px; }
  .cfg-row input[type="text"],
  .cfg-row input[type="number"],
  .cfg-row select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    padding: var(--space-1) var(--space-2);
    width: 200px;
    max-width: 50%;
  }
  .cfg-row.cfg-row-col input[type="text"],
  .cfg-row.cfg-row-col select { width: 100%; max-width: 100%; }
  .cfg-row input:focus, .cfg-row select:focus { outline: 1px solid var(--accent); }
  .cfg-row input[readonly] { color: var(--text-3); cursor: not-allowed; }
  .cfg-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .cfg-radio-group { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .cfg-radio-group label { display: flex; align-items: center; gap: var(--space-1); font-size: var(--fs-sm); cursor: pointer; }
  .cfg-check-group { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .cfg-check-group label { display: flex; align-items: center; gap: var(--space-1); font-size: var(--fs-sm); cursor: pointer; }
  .swatch-radio { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .swatch-radio label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 4px 10px 4px 6px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); font-size: var(--fs-sm);
  }
  .swatch-radio input { accent-color: currentColor; }
  .swatch-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

  .cfg-camera-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .cfg-camera-card:last-child { margin-bottom: 0; }
  .cfg-camera-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2); }
  .cfg-camera-head strong { font-size: var(--fs-sm); }
  .cfg-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-size: var(--fs-xs);
    padding: 4px 10px;
    cursor: pointer;
  }
  .cfg-btn:hover { border-color: var(--border-strong); }
  .cfg-btn.cfg-btn-danger { color: #e5534b; }
  .cfg-btn.cfg-btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); font-weight: var(--fw-medium); }

  .cfg-save-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface-0);
    border-top: 1px solid var(--border);
    padding: var(--space-3) 0;
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .cfg-msg { font-size: var(--fs-sm); }
  .cfg-msg.ok { color: #4caf7d; }
  .cfg-msg.error { color: #e5534b; }

  .cfg-discover-list { display: flex; flex-direction: column; gap: var(--space-2); margin-top: var(--space-2); }
  .cfg-discover-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-3);
  }
  .cfg-discover-row { display: flex; justify-content: space-between; align-items: center; }
  .cfg-discover-detail { margin-top: var(--space-2); display: none; }
  .cfg-discover-detail.open { display: block; }
  .cfg-discover-detail input { margin-right: var(--space-2); margin-bottom: var(--space-2); }

  @media (max-width: 700px) {
    main { flex-direction: column; }
    #sidebar {
      width: 100%;
      max-height: 40%;
      border-right: none;
      border-top: 1px solid var(--border);
      order: 2;
    }
    #player-area { order: 1; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="/static/logo.svg" alt="">
    <h1>ReoLapse</h1>
  </div>
  <div class="pills" id="cameras"></div>
  <div class="pills" id="types">
    <button class="pill active" data-type="daily">Daily</button>
    <button class="pill" data-type="yearly">Yearly</button>
    <button class="pill" data-type="events">Events</button>
    <button class="pill" data-type="storage">Storage</button>
    <button class="pill" data-type="config">Config</button>
  </div>
</header>
<div id="warnings"></div>
<main>
  <div id="sidebar"></div>
  <div id="player-area">
    <div id="empty">Loading&hellip;</div>
  </div>
</main>
<script>
let state = { videos: [], camera: null, type: "daily", current: null };

async function load() {
  const res = await fetch("/api/videos");
  const data = await res.json();
  state.videos = data.videos;

  const warnBox = document.getElementById("warnings");
  warnBox.innerHTML = "";
  (data.warnings || []).forEach(w => {
    const div = document.createElement("div");
    div.className = "warning";
    div.textContent = w;
    warnBox.appendChild(div);
  });

  const camBox = document.getElementById("cameras");
  camBox.innerHTML = "";
  data.cameras.forEach((cam, i) => {
    const b = document.createElement("button");
    b.className = "pill" + (i === 0 ? " active" : "");
    b.textContent = cam;
    b.onclick = () => { state.camera = cam; setActive(camBox, b); refresh(); };
    camBox.appendChild(b);
  });
  state.camera = data.cameras[0] || null;
  refresh();
}

function setActive(container, btn) {
  container.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
}

function refresh() {
  if (state.type === "storage") renderStorage();
  else if (state.type === "config") renderConfig();
  else renderList();
}

document.getElementById("types").addEventListener("click", e => {
  if (!e.target.dataset.type) return;
  state.type = e.target.dataset.type;
  setActive(document.getElementById("types"), e.target);
  refresh();
});

const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                     "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function makeVidItem(v) {
  const div = document.createElement("div");
  div.className = "vid-item";
  div.innerHTML = `<span>${v.label}</span><span class="size">${v.size_mb} MB</span>`;
  div.onclick = () => play(v, div);
  return div;
}

function renderList() {
  const list = state.videos.filter(v => v.camera === state.camera && v.type === state.type);
  const box = document.getElementById("sidebar");
  box.innerHTML = "";
  let firstEl = null;

  // Daily/event labels start with YYYY-MM-DD, so they group naturally by
  // year and month. Yearly labels are just a year — nothing to group.
  if (state.type === "yearly") {
    list.forEach(v => {
      const el = makeVidItem(v);
      firstEl = firstEl || el;
      box.appendChild(el);
    });
  } else {
    const now = new Date();
    const curYear = String(now.getFullYear());
    const curMonth = String(now.getMonth() + 1).padStart(2, "0");
    const groups = new Map();  // year -> Map(month -> videos[])
    list.forEach(v => {
      const m = v.label.match(/^(\d{4})-(\d{2})/);
      const year = m ? m[1] : "Other";
      const month = m ? m[2] : "00";
      if (!groups.has(year)) groups.set(year, new Map());
      const yearMap = groups.get(year);
      if (!yearMap.has(month)) yearMap.set(month, []);
      yearMap.get(month).push(v);
    });

    for (const year of groups.keys()) {
      const yearMap = groups.get(year);
      const yearCount = [...yearMap.values()].reduce((n, arr) => n + arr.length, 0);
      const yearEl = document.createElement("details");
      yearEl.className = "year-group";
      yearEl.open = year === curYear;
      yearEl.innerHTML = `<summary><span>${year}</span><span class="group-count">${yearCount}</span></summary>`;

      for (const month of yearMap.keys()) {
        const videos = yearMap.get(month);
        const monthEl = document.createElement("details");
        monthEl.className = "month-group";
        monthEl.open = year === curYear && month === curMonth;
        const monthName = month === "00" ? "Undated" : MONTH_NAMES[parseInt(month, 10) - 1];
        monthEl.innerHTML = `<summary><span>${monthName}</span><span class="group-count">${videos.length}</span></summary>`;
        videos.forEach(v => {
          const el = makeVidItem(v);
          firstEl = firstEl || el;
          monthEl.appendChild(el);
        });
        yearEl.appendChild(monthEl);
      }
      box.appendChild(yearEl);
    }
  }

  if (list.length) {
    play(list[0], firstEl);
  } else {
    document.getElementById("player-area").innerHTML =
      `<div id="empty">No ${state.type} videos yet${state.camera ? " for " + state.camera : ""}.<br>
       Run <code>build_timelapse.py</code> to create some.</div>`;
    state.current = null;
  }
}

function play(v, itemEl) {
  state.current = v;
  document.querySelectorAll(".vid-item").forEach(el => el.classList.remove("active"));
  if (itemEl) itemEl.classList.add("active");
  const area = document.getElementById("player-area");
  area.innerHTML = `
    <div class="video-wrap">
      <video controls autoplay muted src="${v.url}"></video>
      <div id="controls">
        <span class="label">${v.camera} &middot; ${v.label}</span>
        <span class="label">Speed:</span>
        ${[0.5, 1, 2, 4].map(s =>
          `<button class="speed${s === 1 ? " active" : ""}" data-speed="${s}">${s}&times;</button>`).join("")}
        <a class="dl" href="${v.url}" download>download</a>
      </div>
    </div>`;
  area.querySelectorAll(".speed").forEach(b => {
    b.onclick = () => {
      area.querySelector("video").playbackRate = parseFloat(b.dataset.speed);
      area.querySelectorAll(".speed").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    };
  });
}

function fmtGB(n) {
  return n >= 1 ? n.toFixed(2) + " GB" : Math.round(n * 1024) + " MB";
}

async function renderStorage() {
  document.getElementById("sidebar").innerHTML = "";
  const area = document.getElementById("player-area");
  area.innerHTML = `<div id="empty">Loading storage stats&hellip;</div>`;

  const res = await fetch("/api/storage");
  const data = await res.json();
  if (!data.generated_at) {
    area.innerHTML = `<div id="empty">No storage stats yet.<br>
      They're generated after the first nightly build (or run
      <code>storage_stats.py</code> manually).</div>`;
    return;
  }

  const s = data.system;
  const r = s.retention || {};
  const f = s.forecast || {};
  const b = s.build_time || {};
  const forever = days => !days;

  const cards = [
    ["Disk used", `${s.disk_used_pct}%`, `${s.disk_free_gb} GB free of ${s.disk_total_gb} GB`],
    ["Snapshots (rolling)", fmtGB(s.snapshots_gb), `+${fmtGB(s.snapshots_gb_per_day)}/day`],
    [`Daily videos (${forever(r.daily_video_days) ? "kept forever" : r.daily_video_days + "d retention"})`,
     fmtGB(s.daily_video_gb_total), `+${fmtGB(s.daily_video_gb_per_day)}/day`],
    ["Yearly archive frames (always kept forever)", fmtGB(s.yearly_frames_gb), `+${fmtGB(s.yearly_gb_per_day)}/day`],
    ["Avg build time", b.avg_minutes != null ? `${b.avg_minutes} min` : "—",
     b.samples ? `last: ${(b.last_seconds / 60).toFixed(1)} min &middot; ${b.samples} build(s) tracked` : "no builds recorded yet"],
  ];

  const verdictText = {
    shortage: `Storage shortage: ${fmtGB(f.shortage_gb)} short`,
    excess: `Storage headroom: ${fmtGB(f.excess_gb)} to spare`,
    runway: `Storage runway: ${f.runway_label}`,
  }[f.verdict] || "Storage forecast unavailable";
  const boundedNote = f.growth_needed_gb > 0
    ? `Tiers with retention set still need ${fmtGB(f.growth_needed_gb)} more before reaching their ${fmtGB(f.bounded_ceiling_gb)} ceiling.`
    : `Tiers with retention set are already at their steady-state size (${fmtGB(f.bounded_ceiling_gb)}).`;
  const unboundedNote = f.unbounded_gb_per_day > 0
    ? `Everything without a retention limit — always including the yearly archive frames, by design — grows at ${fmtGB(f.unbounded_gb_per_day)}/day (${fmtGB(f.unbounded_gb_per_year)}/year).`
    : `Every other tier has a retention limit, so total usage stops growing once each reaches it.`;

  const retentionLine = `Retention: snapshots ${forever(r.snapshot_days) ? "forever" : r.snapshot_days + " days"}
    &middot; daily video ${forever(r.daily_video_days) ? "forever" : r.daily_video_days + " days"}
    &middot; yearly video ${forever(r.yearly_video_years) ? "forever" : r.yearly_video_years + " years"}
    &middot; events ${forever(r.events_video_days) ? "forever" : r.events_video_days + " days"}`;

  const camRows = Object.entries(data.cameras).map(([name, c]) => `
    <tr>
      <td>${name}</td>
      <td>${c.avg_snapshot_kb} KB</td>
      <td>${fmtGB(c.snapshots_gb_per_day)}/day</td>
      <td>${c.daily_video_avg_mb} MB/day</td>
      <td>${fmtGB(c.yearly_gb_per_day)}/day</td>
      <td>${c.events_count ? fmtGB(c.events_gb_total) : "—"}</td>
    </tr>`).join("");

  area.innerHTML = `
    <div id="storage-view">
      <div class="stat-cards">
        ${cards.map(([label, val, sub]) => `
          <div class="stat-card">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${val}</div>
            <div class="stat-sub">${sub}</div>
          </div>`).join("")}
      </div>
      <div class="retention-line">${retentionLine}</div>
      <div class="forecast-banner forecast-${f.verdict || "runway"}">
        <div class="forecast-title">${verdictText}</div>
        <div class="forecast-detail">${boundedNote} ${unboundedNote}</div>
      </div>
      <table class="stat-table">
        <thead><tr>
          <th>Camera</th><th>Avg frame</th><th>Snapshots</th>
          <th>Daily video</th><th>Yearly archive</th><th>Events</th>
        </tr></thead>
        <tbody>${camRows}</tbody>
      </table>
      <div class="stat-footnote">Updated ${data.generated_at} &middot; refreshed after each nightly build</div>
    </div>`;
}

const ACCENT_HEX = {amber: "#f2a94e", green: "#6fcf97", blue: "#6fa8f5",
                    red: "#f2705b", purple: "#b18cf2", yellow: "#e8d44a"};
const EVENT_TAGS = ["storm", "snow", "rain", "full-moon", "blue-moon",
                    "harvest-moon", "blood-moon", "lunar-eclipse"];

async function renderConfig() {
  document.getElementById("sidebar").innerHTML = "";
  const area = document.getElementById("player-area");
  area.innerHTML = `<div id="empty">Loading configuration&hellip;</div>`;

  const res = await fetch("/api/config");
  const data = await res.json();
  if (data.error) {
    area.innerHTML = `<div id="empty">${data.error}</div>`;
    return;
  }
  state.configData = data.config;
  state.accentColors = data.accent_colors || Object.keys(ACCENT_HEX);
  state.passwordVars = data.password_vars || [];
  renderConfigForm(area);
}

function cfgGet(path, dflt) {
  let obj = state.configData;
  for (const p of path.split(".")) {
    if (obj == null) return dflt;
    obj = obj[p];
  }
  return obj === undefined || obj === null ? dflt : obj;
}

function cfgSet(path, value) {
  const parts = path.split(".");
  let obj = state.configData;
  for (let i = 0; i < parts.length - 1; i++) {
    if (obj[parts[i]] == null || typeof obj[parts[i]] !== "object") obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = value;
}

function fieldRow(labelText, hintText, inputEl, colLayout) {
  const row = document.createElement("div");
  row.className = "cfg-row" + (colLayout ? " cfg-row-col" : "");
  const label = document.createElement("div");
  label.className = "cfg-label";
  label.innerHTML = hintText
    ? `${labelText}<span class="cfg-hint">${hintText}</span>`
    : labelText;
  row.appendChild(label);
  row.appendChild(inputEl);
  return row;
}

function textField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "text";
  input.value = cfgGet(path, opts.default != null ? opts.default : "");
  if (opts.readonly) input.readOnly = true;
  if (opts.placeholder) input.placeholder = opts.placeholder;
  input.oninput = () => cfgSet(path, input.value);
  return input;
}

function numberField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "number";
  if (opts.step) input.step = opts.step;
  input.value = cfgGet(path, opts.default != null ? opts.default : 0);
  input.oninput = () => cfgSet(path, input.value === "" ? null : parseFloat(input.value));
  return input;
}

function checkboxField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = !!cfgGet(path, !!opts.default);
  input.onchange = () => cfgSet(path, input.checked);
  return input;
}

function extractVarName(value) {
  const m = /^\$\{([A-Za-z_][A-Za-z0-9_]*)\}$/.exec(value || "");
  return m ? m[1] : null;
}

function passwordField(path) {
  // Never shows or accepts a literal secret - only ${VAR_NAME} references.
  // The dropdown lists REOLINK_PASSWORD* variables this server already has
  // loaded from .env (names only; the actual values never reach the
  // browser). "Custom" covers a variable you haven't added to .env yet.
  const wrap = document.createElement("div");
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";
  wrap.style.gap = "4px";
  wrap.style.width = "100%";

  const current = cfgGet(path, "");
  const currentVar = extractVarName(current);
  const known = [...(state.passwordVars || [])];
  if (currentVar && !known.includes(currentVar)) known.push(currentVar);

  const select = document.createElement("select");
  known.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = "${" + name + "}";
    if (name === currentVar) opt.selected = true;
    select.appendChild(opt);
  });
  const customOpt = document.createElement("option");
  customOpt.value = "__custom__";
  customOpt.textContent = "Custom variable name…";
  if (!currentVar) customOpt.selected = true;
  select.appendChild(customOpt);

  const customInput = document.createElement("input");
  customInput.type = "text";
  customInput.placeholder = "REOLINK_PASSWORD_...";
  customInput.style.display = currentVar ? "none" : "block";
  if (!currentVar && current) customInput.value = current.replace(/^\$\{|\}$/g, "");

  select.onchange = () => {
    if (select.value === "__custom__") {
      customInput.style.display = "block";
      customInput.oninput();
    } else {
      customInput.style.display = "none";
      cfgSet(path, "${" + select.value + "}");
    }
  };
  customInput.oninput = () => {
    const name = customInput.value.trim();
    cfgSet(path, name ? "${" + name + "}" : "");
  };

  wrap.appendChild(select);
  wrap.appendChild(customInput);
  return wrap;
}

function tagCheckGroup(path, allTags) {
  const group = document.createElement("div");
  group.className = "cfg-check-group";
  const current = cfgGet(path, []) || [];
  allTags.forEach(tag => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = current.includes(tag);
    cb.onchange = () => {
      let arr = cfgGet(path, []) || [];
      arr = cb.checked ? [...new Set([...arr, tag])] : arr.filter(t => t !== tag);
      cfgSet(path, arr);
    };
    label.appendChild(cb);
    label.appendChild(document.createTextNode(tag));
    group.appendChild(label);
  });
  return group;
}

function buildCamerasSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Cameras</h3>
    <div class="cfg-hint-block">Every camera's password is a reference to a
    variable in <code>.env</code>, never a literal value here. Use one
    <code>REOLINK_PASSWORD</code> for everything, or add more variables named
    <code>REOLINK_PASSWORD_&lt;anything&gt;</code> (e.g.
    <code>REOLINK_PASSWORD_NVR</code>, <code>REOLINK_PASSWORD_BACKYARD</code>)
    if your devices use different accounts — each camera below picks which
    one it uses.</div>`;

  const list = document.createElement("div");
  sec.appendChild(list);
  renderCameraCards(list);

  const addBtn = document.createElement("button");
  addBtn.className = "cfg-btn";
  addBtn.style.marginTop = "8px";
  addBtn.textContent = "+ Add camera manually";

    if (!state.configData.cameras) state.configData.cameras = [];

function renderCameraCards(list) {
  list.innerHTML = "";
  const cams = state.configData.cameras || [];
  cams.forEach((cam, i) => {
    const card = document.createElement("div");
    card.className = "cfg-camera-card";

    const head = document.createElement("div");
    head.className = "cfg-camera-head";
    const title = document.createElement("strong");
    title.textContent = cam.name || `Camera ${i + 1}`;
    const rm = document.createElement("button");
    rm.className = "cfg-btn cfg-btn-danger";
    rm.textContent = "Remove";
    rm.onclick = () => { cams.splice(i, 1); renderCameraCards(list); };
    head.appendChild(title);
    head.appendChild(rm);
    card.appendChild(head);

    card.appendChild(fieldRow("Name", "letters/digits/dashes only", textField(`cameras.${i}.name`)));
    card.appendChild(fieldRow("Host", "camera IP or NVR IP", textField(`cameras.${i}.host`)));
    card.appendChild(fieldRow("Channel", "0 for a camera; NVR channel otherwise",
      numberField(`cameras.${i}.channel`, {default: 0})));
    card.appendChild(fieldRow("Username", "", textField(`cameras.${i}.username`)));
    card.appendChild(fieldRow("Password", "which .env variable holds this camera's password — add the real value there, never here",
      passwordField(`cameras.${i}.password`), true));
    card.appendChild(fieldRow("HTTPS", "", checkboxField(`cameras.${i}.https`, {default: true})));
    card.appendChild(fieldRow("Verify SSL cert", "leave off — Reolink certs are self-signed",
      checkboxField(`cameras.${i}.verify_ssl`, {default: false})));

    if (cam.ptz_home) {
      const hint = document.createElement("div");
      hint.className = "cfg-hint";
      hint.style.marginTop = "6px";
      hint.textContent = "This camera has a PTZ home-position quarantine configured "
        + "— not editable here yet; edit config.yaml directly to change it "
        + "(it will be preserved as-is when you save from this page).";
      card.appendChild(hint);
    }

    list.appendChild(card);
  });
}

function buildDiscoverySection(cameraList) {
  const box = document.createElement("div");
  box.style.marginTop = "16px";
  box.style.borderTop = "1px solid var(--border)";
  box.style.paddingTop = "12px";
  box.innerHTML = `<div class="cfg-hint-block">Scan the local network for
    Reolink cameras/NVRs. This only probes devices — nothing is added to
    your config until you identify one with credentials and click Add.</div>`;

  const scanBtn = document.createElement("button");
  scanBtn.className = "cfg-btn";
  scanBtn.textContent = "Scan network";
  const results = document.createElement("div");
  results.className = "cfg-discover-list";

  scanBtn.onclick = async () => {
    scanBtn.disabled = true;
    scanBtn.textContent = "Scanning…";
    results.innerHTML = "";
    try {
      const res = await fetch("/api/discover", {
        method: "POST", headers: {"Content-Type": "application/json"}, body: "{}",
      });
      const data = await res.json();
      if (!data.found || !data.found.length) {
        results.innerHTML = `<div class="cfg-hint">No Reolink devices found on ${data.subnet}.0/24.</div>`;
      } else {
        data.found.forEach(dev => results.appendChild(buildDiscoveredDeviceItem(dev, cameraList)));
      }
    } catch (e) {
      results.innerHTML = `<div class="cfg-hint">Scan failed: ${e}</div>`;
    }
    scanBtn.disabled = false;
    scanBtn.textContent = "Scan network";
  };

  box.appendChild(scanBtn);
  box.appendChild(results);
  return box;
}

function buildDiscoveredDeviceItem(dev, cameraList) {
  const item = document.createElement("div");
  item.className = "cfg-discover-item";

  const row = document.createElement("div");
  row.className = "cfg-discover-row";
  const label = document.createElement("span");
  label.textContent = `${dev.ip} (${dev.https ? "https" : "http"})`;
  const expandBtn = document.createElement("button");
  expandBtn.className = "cfg-btn";
  expandBtn.textContent = "Identify & add";
  row.appendChild(label);
  row.appendChild(expandBtn);
  item.appendChild(row);

  const detail = document.createElement("div");
  detail.className = "cfg-discover-detail";
  const userInput = document.createElement("input");
  userInput.type = "text";
  userInput.placeholder = "username";
  const passInput = document.createElement("input");
  passInput.type = "password";
  passInput.placeholder = "password";
  detail.appendChild(userInput);
  detail.appendChild(passInput);

  const idBtn = document.createElement("button");
  idBtn.className = "cfg-btn";
  idBtn.textContent = "Identify";
  const idResult = document.createElement("div");
  idResult.style.marginTop = "8px";

  idBtn.onclick = async () => {
    const username = userInput.value, password = passInput.value;
    if (!username || !password) {
      idResult.innerHTML = `<div class="cfg-hint">Enter username and password first.</div>`;
      return;
    }
    idBtn.disabled = true;
    idBtn.textContent = "Identifying…";
    idResult.innerHTML = "";
    try {
      const res = await fetch("/api/discover/identify", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({host: dev.ip, username, password, https: dev.https}),
      });
      const data = await res.json();
      if (data.error) {
        idResult.innerHTML = `<div class="cfg-hint">${data.error}</div>`;
      } else {
        const infoLine = document.createElement("div");
        infoLine.className = "cfg-hint";
        infoLine.textContent = `${data.model || "Unknown model"} — ${data.name || dev.ip}`;
        idResult.appendChild(infoLine);
        const channels = (data.channels && data.channels.length)
          ? data.channels : [{channel: 0, name: data.name || dev.ip}];
        channels.forEach(ch => {
          const addBtn = document.createElement("button");
          addBtn.className = "cfg-btn cfg-btn-primary";
          addBtn.style.marginTop = "6px";
          addBtn.style.marginRight = "6px";
          addBtn.textContent = `Add ch.${ch.channel}${ch.name ? " (" + ch.name + ")" : ""}`;
          addBtn.onclick = () => {
            const slug = (ch.name || `cam-${dev.ip.split(".").pop()}`)
              .toLowerCase().replace(/[^a-z0-9-]+/g, "-").replace(/^-+|-+$/g, "");
            const varName = "REOLINK_PASSWORD_" + slug.toUpperCase().replace(/-/g, "_");
            if (!state.configData.cameras) state.configData.cameras = [];
            state.configData.cameras.push({
              name: slug || `cam-${dev.ip.split(".").pop()}`,
              host: dev.ip, channel: ch.channel, username,
              password: "${" + varName + "}",
              https: dev.https, verify_ssl: false,
            });
            renderCameraCards(cameraList);
            const note = document.createElement("div");
            note.className = "cfg-hint";
            note.style.marginTop = "4px";
            note.textContent = `Added. The password typed above was used only for this `
              + `one-time lookup and isn't saved — set ${varName}=... in your .env file `
              + `before restarting the capture service.`;
            idResult.appendChild(note);
          };
          idResult.appendChild(addBtn);
        });
      }
    } catch (e) {
      idResult.innerHTML = `<div class="cfg-hint">Identify failed: ${e}</div>`;
    }
    idBtn.disabled = false;
    idBtn.textContent = "Identify";
  };
  detail.appendChild(idBtn);
  detail.appendChild(idResult);
  item.appendChild(detail);

  expandBtn.onclick = () => detail.classList.toggle("open");
  return item;
}

function buildEventsSection() {

  const modeRow = document.createElement("div");
  modeRow.className = "cfg-row cfg-row-col";
  const modeLabel = document.createElement("div");

  zipRadio.onchange = () => {
    if (!zipRadio.checked) return;
    zipRow.style.display = "flex"; latRow.style.display = "none"; lonRow.style.display = "none";
    cfgSet("events.latitude", null);
    cfgSet("events.longitude", null);
  };
  latRadio.onchange = () => {
    if (!latRadio.checked) return;
    zipRow.style.display = "none"; latRow.style.display = "flex"; lonRow.style.display = "flex";
    cfgSet("events.zip", null);
  };

  sec.appendChild(fieldRow("Poll interval (minutes)", "",
    numberField("events.poll_minutes", {default: 5})));
  sec.appendChild(fieldRow("Burst interval (seconds)", "capture cadence while a burst tag is active",
    numberField("events.burst_interval_seconds", {default: 10})));
  sec.appendChild(fieldRow("Burst tags", "which tags switch capture to the burst interval",
    tagCheckGroup("events.burst_tags", ["storm", "snow", "rain"]), true));

  return sec;
}

function buildEventsVideoSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Event video clips</h3>`;
  sec.appendChild(fieldRow("Tags that get their own clip", "any active tag works, including moon/season",
    tagCheckGroup("events_video.tags", EVENT_TAGS), true));
  sec.appendChild(fieldRow("Minimum frames", "skip clips shorter than this",
    numberField("events_video.min_frames", {default: 30})));
  sec.appendChild(fieldRow("Frame rate (fps)", "", numberField("events_video.fps", {default: 30})));
  sec.appendChild(fieldRow("Quality (CRF)", "", numberField("events_video.crf", {default: 20})));
  sec.appendChild(fieldRow("Deflicker window",
    "0 = off (protects lightning in storm clips). Per-tag overrides aren't editable here — set deflicker_by_tag in config.yaml directly.",
    numberField("events_video.deflicker_size", {default: 0})));
  sec.appendChild(fieldRow("Retention (days)", "0 = keep forever",
    numberField("events_video.retention_days", {default: 0})));
  return sec;
}

function buildWebappSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Web UI</h3>`;
  sec.appendChild(fieldRow("Host", "0.0.0.0 to listen on all interfaces",
    textField("webapp.host", {default: "0.0.0.0"})));
  sec.appendChild(fieldRow("Port", "", numberField("webapp.port", {default: 8080})));

  const colorRow = document.createElement("div");
  colorRow.className = "cfg-row cfg-row-col";
  const colorLabel = document.createElement("div");
  colorLabel.className = "cfg-label";
  colorLabel.textContent = "Accent color";
  const swatchGroup = document.createElement("div");
  swatchGroup.className = "swatch-radio";
  const current = cfgGet("webapp.accent_color", "amber");
  state.accentColors.forEach(name => {
    const label = document.createElement("label");
    const radio = document.createElement("input");
    radio.type = "radio"; radio.name = "accent"; radio.value = name;
    radio.checked = name === current;
    radio.onchange = () => cfgSet("webapp.accent_color", name);
    const dot = document.createElement("span");
    dot.className = "swatch-dot";
    dot.style.background = ACCENT_HEX[name] || "#888";
    label.appendChild(radio);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(name));
    swatchGroup.appendChild(label);
  });
  colorRow.appendChild(colorLabel);
  colorRow.appendChild(swatchGroup);
  sec.appendChild(colorRow);

  const hint = document.createElement("div");
  hint.className = "cfg-hint-block";
  hint.style.marginTop = "8px";
  hint.textContent = "Accent color applies on next page load after saving. "
    + "Everything else needs a service restart to take effect.";
  sec.appendChild(hint);

  return sec;
}

load();
</script>
</body>
</html>
