<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReoLapse</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml">
<style>
  :root {
    /* Surfaces */
    --surface-0: #14161a;
    --surface-1: #1d2026;
    --surface-2: #24282f;
    /* Borders */
    --border: #30343c;
    --border-strong: #3d424c;
    /* Text */
    --text-1: #e8eaed;
    --text-2: #9aa0a8;
    --text-3: #6b7280;
    /* Brand accent, from the logo's sun */
    --accent: #f2a94e;
    --accent-strong: #f79a3e;
    --accent-contrast: #14161a;
    --accent-quiet: rgba(242, 169, 78, 0.14);
    /* Typography */
    --font-sans: system-ui, "Segoe UI", Roboto, sans-serif;
    --fs-xs: 12px;
    --fs-sm: 13px;
    --fs-base: 15px;
    --fs-lg: 17px;
    --lh: 1.5;
    --fw-regular: 400;
    --fw-medium: 500;
    --fw-semibold: 600;
    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    /* Radii */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 10px;
    --radius-pill: 999px;
    /* Motion & layout */
    --transition: 120ms ease;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--surface-0);
    color: var(--text-1);
    font: var(--fs-base)/var(--lh) var(--font-sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: var(--space-3) var(--space-5);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .brand { display: flex; align-items: center; gap: var(--space-2); }
  .brand img { width: 26px; height: 26px; display: block; }
  .brand h1 {
    margin: 0;
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
    letter-spacing: 0.2px;
  }
  .brand .version { color: var(--text-3); font-size: var(--fs-xs); align-self: flex-end; margin-bottom: 3px; }

  .pills { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .pill {
    padding: var(--space-1) var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), background var(--transition), border-color var(--transition);
  }
  .pill:hover { color: var(--text-1); border-color: var(--border-strong); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
    font-weight: var(--fw-medium);
  }

  main { flex: 1; display: flex; min-height: 0; }

  #content-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  #cfg-footer {
    display: none;
    flex-shrink: 0;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-5);
    border-top: 1px solid var(--border);
    background: var(--surface-0);
  }
  #cfg-footer.visible { display: flex; }

  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: var(--space-2);
  }
  .vid-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
  }
  .vid-item:hover { background: var(--surface-1); }
  .vid-item.active { background: var(--accent-quiet); color: var(--accent); }
  .vid-item .size { color: var(--text-2); font-size: var(--fs-xs); white-space: nowrap; }

  .year-group, .month-group { border: none; }
  .year-group > summary, .month-group > summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    list-style: none;
    color: var(--text-1);
    font-weight: var(--fw-medium);
  }
  .year-group > summary::-webkit-details-marker,
  .month-group > summary::-webkit-details-marker { display: none; }
  .year-group > summary:hover, .month-group > summary:hover { background: var(--surface-1); }
  .year-group > summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: var(--space-2);
    color: var(--text-3);
    transition: transform var(--transition);
  }
  .year-group[open] > summary::before { transform: rotate(90deg); }
  .month-group { margin-left: var(--space-2); }
  .month-group > summary {
    font-size: var(--fs-sm);
    font-weight: var(--fw-regular);
    color: var(--text-2);
  }
  .month-group > summary::before {
    content: "\25B8";
    display: inline-block;
    margin-right: var(--space-2);
    font-size: var(--fs-xs);
    transition: transform var(--transition);
  }
  .month-group[open] > summary::before { transform: rotate(90deg); }
  .month-group .vid-item { margin-left: var(--space-4); }
  .group-count { color: var(--text-3); font-size: var(--fs-xs); font-weight: var(--fw-regular); }

  #player-area {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* flex-start, not center: with overflow-y:auto, justify-content:center
       pushes overflowing content's start edge out of scroll range - tall
       views (Config, Storage) would have their top clipped and unreachable
       by scrolling. Content shorter than the viewport (the video player) is
       centered instead via margin:auto on .video-wrap below, which doesn't
       have that bug. */
    justify-content: flex-start;
    padding: var(--space-5);
    overflow-y: auto;
  }
  .video-wrap { margin: auto 0; display: flex; flex-direction: column; align-items: center; }
  #empty { margin: auto; }
  video {
    max-width: 100%;
    max-height: calc(100% - 60px);
    border-radius: var(--radius-lg);
    background: #000;
  }

  #controls {
    margin-top: var(--space-3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    flex-wrap: wrap;
  }
  #controls .label { color: var(--text-2); font-size: var(--fs-sm); }
  .speed {
    padding: var(--space-1) var(--space-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-xs)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
  }
  .speed:hover { color: var(--text-1); border-color: var(--border-strong); }
  .speed.active { color: var(--accent); border-color: var(--accent); }
  a.dl { color: var(--text-2); font-size: var(--fs-sm); text-decoration: none; }
  a.dl:hover { color: var(--accent); }

  #empty { color: var(--text-2); text-align: center; padding: var(--space-6); line-height: 1.6; }
  #empty code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
  }

  #warnings:empty { display: none; }
  .warning {
    padding: var(--space-2) var(--space-5);
    background: var(--accent-quiet);
    color: var(--accent);
    font-size: var(--fs-sm);
    border-bottom: 1px solid var(--border);
  }

  #storage-view { width: 100%; max-width: 760px; }
  .forecast-banner {
    margin: var(--space-4) 0;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface-1);
  }
  .forecast-title { font-size: 16px; font-weight: var(--fw-semibold); margin-bottom: var(--space-1); }
  .forecast-detail { color: var(--text-2); font-size: var(--fs-sm); }
  .forecast-runway { border-color: var(--accent); }
  .forecast-runway .forecast-title { color: var(--accent); }
  .forecast-excess { border-color: #4caf7d; }
  .forecast-excess .forecast-title { color: #4caf7d; }
  .forecast-shortage { border-color: #e5534b; }
  .forecast-shortage .forecast-title { color: #e5534b; }
  .retention-line { color: var(--text-2); font-size: var(--fs-xs); margin-bottom: var(--space-2); }
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: var(--space-3);
  }
  .stat-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
  }
  .stat-label { color: var(--text-2); font-size: var(--fs-xs); }
  .stat-value {
    font-size: 22px;
    font-weight: var(--fw-semibold);
    margin: var(--space-1) 0;
  }
  .stat-sub { color: var(--text-2); font-size: var(--fs-xs); }
  .stat-projection {
    margin: var(--space-4) 0;
    color: var(--text-2);
    font-size: var(--fs-sm);
  }
  .stat-projection strong { color: var(--text-1); font-weight: var(--fw-medium); }
  .stat-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
  .stat-table th, .stat-table td {
    text-align: left;
    padding: var(--space-2) var(--space-3);
    border-bottom: 1px solid var(--border);
  }
  .stat-table th { color: var(--text-2); font-weight: var(--fw-regular); }
  .stat-footnote {
    margin-top: var(--space-3);
    color: var(--text-3);
    font-size: var(--fs-xs);
  }

  #cfg-view { width: 100%; max-width: 720px; }
  .cfg-section {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    margin-bottom: var(--space-4);
  }
  .cfg-section h3 {
    margin: 0 0 var(--space-3) 0;
    font-size: var(--fs-base);
    font-weight: var(--fw-semibold);
  }
  .cfg-section .cfg-hint-block {
    color: var(--text-2);
    font-size: var(--fs-xs);
    margin-bottom: var(--space-3);
    line-height: 1.5;
  }
  .cfg-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-4);
    padding: var(--space-2) 0;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row:last-child { border-bottom: none; }
  .cfg-row.cfg-row-col { flex-direction: column; align-items: stretch; gap: var(--space-1); }
  .cfg-label { font-size: var(--fs-sm); color: var(--text-1); flex: 1 1 auto; min-width: 0; }
  .cfg-hint { display: block; color: var(--text-3); font-size: var(--fs-xs); margin-top: 2px; }
  .cfg-row input[type="text"],
  .cfg-row input[type="number"],
  .cfg-row select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    padding: var(--space-1) var(--space-2);
    width: 200px;
    max-width: 50%;
    flex-shrink: 0;
  }
  .cfg-row input[type="checkbox"] { flex-shrink: 0; margin-top: 2px; }
  .cfg-row.cfg-row-col input[type="text"],
  .cfg-row.cfg-row-col select { width: 100%; max-width: 100%; }
  .cfg-row input:focus, .cfg-row select:focus { outline: 1px solid var(--accent); }
  .cfg-row input[readonly] { color: var(--text-3); cursor: not-allowed; }
  .cfg-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .cfg-radio-group { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .cfg-radio-group label { display: flex; align-items: center; gap: var(--space-1); font-size: var(--fs-sm); cursor: pointer; }
  .cfg-check-group { display: flex; gap: var(--space-3); flex-wrap: wrap; }
  .cfg-check-group label { display: flex; align-items: center; gap: var(--space-1); font-size: var(--fs-sm); cursor: pointer; }
  .swatch-radio { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .swatch-radio label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 4px 10px 4px 6px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); font-size: var(--fs-sm);
  }
  .swatch-radio input { accent-color: currentColor; }
  .swatch-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

  .cfg-camera-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .cfg-camera-card:last-child { margin-bottom: 0; }
  .cfg-camera-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2); }
  .cfg-camera-head strong { font-size: var(--fs-sm); }
  .cfg-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-size: var(--fs-xs);
    padding: 4px 10px;
    cursor: pointer;
  }
  .cfg-btn:hover { border-color: var(--border-strong); }
  .cfg-btn.cfg-btn-danger { color: #e5534b; }
  .cfg-btn.cfg-btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); font-weight: var(--fw-medium); }

  .cfg-msg { font-size: var(--fs-sm); }
  .cfg-msg.ok { color: #4caf7d; }
  .cfg-msg.error { color: #e5534b; }

  .cfg-login-row { display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-2); }
  .cfg-login-row input[type="password"] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    padding: var(--space-1) var(--space-2);
    width: 200px;
  }
  .cfg-login-row input[type="password"]:focus { outline: 1px solid var(--accent); }
  .cfg-section.cfg-login { max-width: 520px; }

  .cfg-discover-list { display: flex; flex-direction: column; gap: var(--space-2); margin-top: var(--space-2); }
  .cfg-discover-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-3);
  }
  .cfg-discover-row { display: flex; justify-content: space-between; align-items: center; }
  .cfg-discover-detail { margin-top: var(--space-2); display: none; }
  .cfg-discover-detail.open { display: block; }
  .cfg-discover-detail input { margin-right: var(--space-2); margin-bottom: var(--space-2); }

  @media (max-width: 700px) {
    main { flex-direction: column; }
    #sidebar {
      width: 100%;
      max-height: 40%;
      border-right: none;
      border-top: 1px solid var(--border);
      order: 2;
    }
    #content-col { order: 1; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="/static/logo.svg" alt="">
    <h1>ReoLapse</h1>
    <span class="version" id="version"></span>
  </div>
  <div class="pills" id="cameras"></div>
  <div class="pills" id="types">
    <button class="pill active" data-type="daily">Daily</button>
    <button class="pill" data-type="yearly">Yearly</button>
    <button class="pill" data-type="events">Events</button>
    <button class="pill" data-type="storage">Storage</button>
    <button class="pill" data-type="config">Config</button>
  </div>
</header>
<div id="warnings"></div>
<main>
  <div id="sidebar"></div>
  <div id="content-col">
    <div id="player-area">
      <div id="empty">Loading&hellip;</div>
    </div>
    <div id="cfg-footer"></div>
  </div>
</main>
<script>
let state = { videos: [], camera: null, type: "daily", current: null };

async function load() {
  const res = await fetch("/api/videos");
  const data = await res.json();
  state.videos = data.videos;
  if (data.version) {
    const v = document.getElementById("version");
    if (v) v.textContent = "v" + data.version;
  }

  const warnBox = document.getElementById("warnings");
  warnBox.innerHTML = "";
  (data.warnings || []).forEach(w => {
    const div = document.createElement("div");
    div.className = "warning";
    div.textContent = w;
    warnBox.appendChild(div);
  });

  const camBox = document.getElementById("cameras");
  camBox.innerHTML = "";
  data.cameras.forEach((cam, i) => {
    const b = document.createElement("button");
    b.className = "pill" + (i === 0 ? " active" : "");
    b.textContent = cam;
    b.onclick = () => { state.camera = cam; setActive(camBox, b); refresh(); };
    camBox.appendChild(b);
  });
  state.camera = data.cameras[0] || null;
  refresh();
}

function setActive(container, btn) {
  container.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
}

function refresh() {
  if (state.type !== "config") {
    document.getElementById("cfg-footer").classList.remove("visible");
  }
  if (state.type === "storage") renderStorage();
  else if (state.type === "config") renderConfig();
  else renderList();
}

document.getElementById("types").addEventListener("click", e => {
  if (!e.target.dataset.type) return;
  state.type = e.target.dataset.type;
  setActive(document.getElementById("types"), e.target);
  refresh();
});

const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                     "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function makeVidItem(v) {
  const div = document.createElement("div");
  div.className = "vid-item";
  div.innerHTML = `<span>${v.label}</span><span class="size">${v.size_mb} MB</span>`;
  div.onclick = () => play(v, div);
  return div;
}

function renderList() {
  const list = state.videos.filter(v => v.camera === state.camera && v.type === state.type);
  const box = document.getElementById("sidebar");
  box.innerHTML = "";
  let firstEl = null;

  // Daily/event labels start with YYYY-MM-DD, so they group naturally by
  // year and month. Yearly labels are just a year — nothing to group.
  if (state.type === "yearly") {
    list.forEach(v => {
      const el = makeVidItem(v);
      firstEl = firstEl || el;
      box.appendChild(el);
    });
  } else {
    const now = new Date();
    const curYear = String(now.getFullYear());
    const curMonth = String(now.getMonth() + 1).padStart(2, "0");
    const groups = new Map();  // year -> Map(month -> videos[])
    list.forEach(v => {
      const m = v.label.match(/^(\d{4})-(\d{2})/);
      const year = m ? m[1] : "Other";
      const month = m ? m[2] : "00";
      if (!groups.has(year)) groups.set(year, new Map());
      const yearMap = groups.get(year);
      if (!yearMap.has(month)) yearMap.set(month, []);
      yearMap.get(month).push(v);
    });

    for (const year of groups.keys()) {
      const yearMap = groups.get(year);
      const yearCount = [...yearMap.values()].reduce((n, arr) => n + arr.length, 0);
      const yearEl = document.createElement("details");
      yearEl.className = "year-group";
      yearEl.open = year === curYear;
      yearEl.innerHTML = `<summary><span>${year}</span><span class="group-count">${yearCount}</span></summary>`;

      for (const month of yearMap.keys()) {
        const videos = yearMap.get(month);
        const monthEl = document.createElement("details");
        monthEl.className = "month-group";
        monthEl.open = year === curYear && month === curMonth;
        const monthName = month === "00" ? "Undated" : MONTH_NAMES[parseInt(month, 10) - 1];
        monthEl.innerHTML = `<summary><span>${monthName}</span><span class="group-count">${videos.length}</span></summary>`;
        videos.forEach(v => {
          const el = makeVidItem(v);
          firstEl = firstEl || el;
          monthEl.appendChild(el);
        });
        yearEl.appendChild(monthEl);
      }
      box.appendChild(yearEl);
    }
  }

  if (list.length) {
    play(list[0], firstEl);
  } else {
    document.getElementById("player-area").innerHTML =
      `<div id="empty">No ${state.type} videos yet${state.camera ? " for " + state.camera : ""}.<br>
       Run <code>build_timelapse.py</code> to create some.</div>`;
    state.current = null;
  }
}

function play(v, itemEl) {
  state.current = v;
  document.querySelectorAll(".vid-item").forEach(el => el.classList.remove("active"));
  if (itemEl) itemEl.classList.add("active");
  const area = document.getElementById("player-area");
  area.innerHTML = `
    <div class="video-wrap">
      <video controls autoplay muted src="${v.url}"></video>
      <div id="controls">
        <span class="label">${v.camera} &middot; ${v.label}</span>
        <span class="label">Speed:</span>
        ${[0.5, 1, 2, 4].map(s =>
          `<button class="speed${s === 1 ? " active" : ""}" data-speed="${s}">${s}&times;</button>`).join("")}
        <a class="dl" href="${v.url}" download>download</a>
      </div>
    </div>`;
  area.querySelectorAll(".speed").forEach(b => {
    b.onclick = () => {
      area.querySelector("video").playbackRate = parseFloat(b.dataset.speed);
      area.querySelectorAll(".speed").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    };
  });
}

function fmtGB(n) {
  return n >= 1 ? n.toFixed(2) + " GB" : Math.round(n * 1024) + " MB";
}

async function renderStorage() {
  document.getElementById("sidebar").innerHTML = "";
  const area = document.getElementById("player-area");
  area.innerHTML = `<div id="empty">Loading storage stats&hellip;</div>`;

  const res = await fetch("/api/storage");
  const data = await res.json();
  if (!data.generated_at) {
    area.innerHTML = `<div id="empty">No storage stats yet.<br>
      They're generated after the first nightly build (or run
      <code>storage_stats.py</code> manually).</div>`;
    return;
  }

  const s = data.system;
  const r = s.retention || {};
  const f = s.forecast || {};
  const b = s.build_time || {};
  const forever = days => !days;

  const cards = [
    ["Disk used", `${s.disk_used_pct}%`, `${s.disk_free_gb} GB free of ${s.disk_total_gb} GB`],
    ["Snapshots (rolling)", fmtGB(s.snapshots_gb), `+${fmtGB(s.snapshots_gb_per_day)}/day`],
    [`Daily videos (${forever(r.daily_video_days) ? "kept forever" : r.daily_video_days + "d retention"})`,
     fmtGB(s.daily_video_gb_total), `+${fmtGB(s.daily_video_gb_per_day)}/day`],
    ["Yearly archive frames (always kept forever)", fmtGB(s.yearly_frames_gb), `+${fmtGB(s.yearly_gb_per_day)}/day`],
    ["Avg build time", b.avg_minutes != null ? `${b.avg_minutes} min` : "—",
     b.samples ? `last: ${(b.last_seconds / 60).toFixed(1)} min &middot; ${b.samples} build(s) tracked` : "no builds recorded yet"],
  ];

  const verdictText = {
    shortage: `Storage shortage: ${fmtGB(f.shortage_gb)} short`,
    excess: `Storage headroom: ${fmtGB(f.excess_gb)} to spare`,
    runway: `Storage runway: ${f.runway_label}`,
  }[f.verdict] || "Storage forecast unavailable";
  const boundedNote = f.growth_needed_gb > 0
    ? `Tiers with retention set still need ${fmtGB(f.growth_needed_gb)} more before reaching their ${fmtGB(f.bounded_ceiling_gb)} ceiling.`
    : `Tiers with retention set are already at their steady-state size (${fmtGB(f.bounded_ceiling_gb)}).`;
  const unboundedNote = f.unbounded_gb_per_day > 0
    ? `Everything without a retention limit — always including the yearly archive frames, by design — grows at ${fmtGB(f.unbounded_gb_per_day)}/day (${fmtGB(f.unbounded_gb_per_year)}/year).`
    : `Every other tier has a retention limit, so total usage stops growing once each reaches it.`;

  const retentionLine = `Retention: snapshots ${forever(r.snapshot_days) ? "forever" : r.snapshot_days + " days"}
    &middot; daily video ${forever(r.daily_video_days) ? "forever" : r.daily_video_days + " days"}
    &middot; yearly video ${forever(r.yearly_video_years) ? "forever" : r.yearly_video_years + " years"}
    &middot; events ${forever(r.events_video_days) ? "forever" : r.events_video_days + " days"}`;

  const camRows = Object.entries(data.cameras).map(([name, c]) => `
    <tr>
      <td>${name}</td>
      <td>${c.avg_snapshot_kb} KB</td>
      <td>${fmtGB(c.snapshots_gb_per_day)}/day</td>
      <td>${c.daily_video_avg_mb} MB/day</td>
      <td>${fmtGB(c.yearly_gb_per_day)}/day</td>
      <td>${c.events_count ? fmtGB(c.events_gb_total) : "—"}</td>
    </tr>`).join("");

  area.innerHTML = `
    <div id="storage-view">
      <div class="stat-cards">
        ${cards.map(([label, val, sub]) => `
          <div class="stat-card">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${val}</div>
            <div class="stat-sub">${sub}</div>
          </div>`).join("")}
      </div>
      <div class="retention-line">${retentionLine}</div>
      <div class="forecast-banner forecast-${f.verdict || "runway"}">
        <div class="forecast-title">${verdictText}</div>
        <div class="forecast-detail">${boundedNote} ${unboundedNote}</div>
      </div>
      <table class="stat-table">
        <thead><tr>
          <th>Camera</th><th>Avg frame</th><th>Snapshots</th>
          <th>Daily video</th><th>Yearly archive</th><th>Events</th>
        </tr></thead>
        <tbody>${camRows}</tbody>
      </table>
      <div class="stat-footnote">Updated ${data.generated_at} &middot; refreshed after each nightly build</div>
    </div>`;
}

const ACCENT_HEX = {amber: "#f2a94e", green: "#6fcf97", blue: "#6fa8f5",
                    red: "#f2705b", purple: "#b18cf2", yellow: "#e8d44a"};
const EVENT_TAGS = ["storm", "snow", "rain", "full-moon", "blue-moon",
                    "harvest-moon", "blood-moon", "lunar-eclipse"];

async function renderConfig() {
  document.getElementById("sidebar").innerHTML = "";
  const area = document.getElementById("player-area");
  area.innerHTML = `<div id="empty">Loading configuration&hellip;</div>`;
  document.getElementById("cfg-footer").classList.remove("visible");

  // Is a passcode gate in front of the Config API? (Opt-in; if no passcode is
  // set the whole app stays open and this just reports enabled:false.)
  let auth = {enabled: false, authed: true};
  try { auth = await (await fetch("/api/auth")).json(); } catch (e) {}
  state.authEnabled = !!auth.enabled;
  state.authed = !!auth.authed;
  if (state.authEnabled && !state.authed) { renderLogin(area); return; }

  const res = await fetch("/api/config");
  if (res.status === 401) {   // session expired between the two calls
    state.authed = false;
    renderLogin(area);
    return;
  }
  const data = await res.json();
  if (data.error) {
    area.innerHTML = `<div id="empty">${data.error}</div>`;
    return;
  }
  state.configData = data.config;
  state.accentColors = data.accent_colors || Object.keys(ACCENT_HEX);
  state.passwordVars = data.password_vars || [];
  renderConfigForm(area);
}

// Passcode gate shown when the Config API is locked. Keeps the save/restart
// footer hidden — nothing to save until you're in.
function renderLogin(area) {
  document.getElementById("cfg-footer").classList.remove("visible");
  const wrap = document.createElement("div");
  wrap.id = "cfg-view";
  const card = document.createElement("div");
  card.className = "cfg-section cfg-login";
  card.innerHTML = `<h3>Config page locked</h3>
    <div class="cfg-hint-block">This page can edit <code>config.yaml</code> and
    scan your network, so it's protected by a passcode. Video browsing stays
    open — only the Config tab is gated.</div>`;

  const row = document.createElement("div");
  row.className = "cfg-login-row";
  const input = document.createElement("input");
  input.type = "password";
  input.placeholder = "Passcode";
  input.autofocus = true;
  const btn = document.createElement("button");
  btn.className = "cfg-btn cfg-btn-primary";
  btn.textContent = "Unlock";
  const msg = document.createElement("div");
  msg.className = "cfg-msg";

  const submit = async () => {
    msg.className = "cfg-msg";
    msg.textContent = "Checking…";
    btn.disabled = true;
    try {
      const res = await fetch("/api/auth", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({passcode: input.value}),
      });
      const data = await res.json();
      if (res.ok) { renderConfig(); return; }
      msg.className = "cfg-msg error";
      msg.textContent = data.error || "Incorrect passcode.";
    } catch (e) {
      msg.className = "cfg-msg error";
      msg.textContent = "Login failed: " + e;
    }
    btn.disabled = false;
    input.select();
  };
  btn.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });

  row.appendChild(input);
  row.appendChild(btn);
  card.appendChild(row);
  card.appendChild(msg);
  wrap.appendChild(card);
  area.innerHTML = "";
  area.appendChild(wrap);
  input.focus();
}

function cfgGet(path, dflt) {
  let obj = state.configData;
  for (const p of path.split(".")) {
    if (obj == null) return dflt;
    obj = obj[p];
  }
  return obj === undefined || obj === null ? dflt : obj;
}

function cfgSet(path, value) {
  const parts = path.split(".");
  let obj = state.configData;
  for (let i = 0; i < parts.length - 1; i++) {
    if (obj[parts[i]] == null || typeof obj[parts[i]] !== "object") obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = value;
}

function fieldRow(labelText, hintText, inputEl, colLayout) {
  const row = document.createElement("div");
  row.className = "cfg-row" + (colLayout ? " cfg-row-col" : "");
  const label = document.createElement("div");
  label.className = "cfg-label";
  label.innerHTML = hintText
    ? `${labelText}<span class="cfg-hint">${hintText}</span>`
    : labelText;
  row.appendChild(label);
  row.appendChild(inputEl);
  return row;
}

function textField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "text";
  input.value = cfgGet(path, opts.default != null ? opts.default : "");
  if (opts.readonly) input.readOnly = true;
  if (opts.placeholder) input.placeholder = opts.placeholder;
  input.oninput = () => cfgSet(path, input.value);
  return input;
}

function numberField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "number";
  if (opts.step) input.step = opts.step;
  if (opts.min != null) input.min = opts.min;
  input.value = cfgGet(path, opts.default != null ? opts.default : 0);
  input.oninput = () => cfgSet(path, input.value === "" ? null : parseFloat(input.value));
  return input;
}

function selectField(path, options, opts) {
  opts = opts || {};
  const select = document.createElement("select");
  const current = cfgGet(path, opts.default);
  options.forEach(value => {
    const o = document.createElement("option");
    o.value = value;
    o.textContent = value;
    if (value === current) o.selected = true;
    select.appendChild(o);
  });
  select.onchange = () => cfgSet(path, select.value);
  return select;
}

const X264_PRESETS = ["ultrafast", "superfast", "veryfast", "faster", "fast",
                      "medium", "slow", "slower", "veryslow"];

function checkboxField(path, opts) {
  opts = opts || {};
  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = !!cfgGet(path, !!opts.default);
  input.onchange = () => cfgSet(path, input.checked);
  return input;
}

function extractVarName(value) {
  const m = /^\$\{([A-Za-z_][A-Za-z0-9_]*)\}$/.exec(value || "");
  return m ? m[1] : null;
}

function passwordField(path) {
  // Never shows or accepts a literal secret - only ${VAR_NAME} references.
  // The dropdown lists REOLINK_PASSWORD* variables this server already has
  // loaded from .env (names only; the actual values never reach the
  // browser). "Custom" covers a variable you haven't added to .env yet.
  const wrap = document.createElement("div");
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";
  wrap.style.gap = "4px";
  wrap.style.width = "100%";

  const current = cfgGet(path, "");
  const currentVar = extractVarName(current);
  const known = [...(state.passwordVars || [])];
  if (currentVar && !known.includes(currentVar)) known.push(currentVar);

  const select = document.createElement("select");
  known.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = "${" + name + "}";
    if (name === currentVar) opt.selected = true;
    select.appendChild(opt);
  });
  const customOpt = document.createElement("option");
  customOpt.value = "__custom__";
  customOpt.textContent = "Custom variable name…";
  if (!currentVar) customOpt.selected = true;
  select.appendChild(customOpt);

  const customInput = document.createElement("input");
  customInput.type = "text";
  customInput.placeholder = "REOLINK_PASSWORD_...";
  customInput.style.display = currentVar ? "none" : "block";
  if (!currentVar && current) customInput.value = current.replace(/^\$\{|\}$/g, "");

  select.onchange = () => {
    if (select.value === "__custom__") {
      customInput.style.display = "block";
      customInput.oninput();
    } else {
      customInput.style.display = "none";
      cfgSet(path, "${" + select.value + "}");
    }
  };
  customInput.oninput = () => {
    const name = customInput.value.trim();
    cfgSet(path, name ? "${" + name + "}" : "");
  };

  wrap.appendChild(select);
  wrap.appendChild(customInput);
  return wrap;
}

function tagCheckGroup(path, allTags) {
  const group = document.createElement("div");
  group.className = "cfg-check-group";
  const current = cfgGet(path, []) || [];
  allTags.forEach(tag => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = current.includes(tag);
    cb.onchange = () => {
      let arr = cfgGet(path, []) || [];
      arr = cb.checked ? [...new Set([...arr, tag])] : arr.filter(t => t !== tag);
      cfgSet(path, arr);
    };
    label.appendChild(cb);
    label.appendChild(document.createTextNode(tag));
    group.appendChild(label);
  });
  return group;
}

function renderConfigForm(area) {
  const wrap = document.createElement("div");
  wrap.id = "cfg-view";

  wrap.appendChild(buildCamerasSection());
  wrap.appendChild(buildCaptureSection());
  wrap.appendChild(buildStorageSection());
  wrap.appendChild(buildDailyVideoSection());
  wrap.appendChild(buildYearlySection());
  wrap.appendChild(buildEventsSection());
  wrap.appendChild(buildEventsVideoSection());
  wrap.appendChild(buildWebappSection());
  wrap.appendChild(buildSecuritySection());

  area.innerHTML = "";
  area.appendChild(wrap);

  // The save/restart bar lives in #cfg-footer, a flex sibling of #player-area
  // (not inside the scrolling content) so it's always visible at the bottom
  // without ever overlapping content as you scroll through a long form.
  const footer = document.getElementById("cfg-footer");
  footer.innerHTML = "";
  footer.classList.add("visible");

  const msg = document.createElement("span");
  msg.className = "cfg-msg";

  const saveBtn = document.createElement("button");
  saveBtn.className = "cfg-btn cfg-btn-primary";
  saveBtn.textContent = "Save config";
  saveBtn.onclick = async () => {
    msg.className = "cfg-msg";
    msg.textContent = "Saving…";
    try {
      const res = await fetch("/api/config", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(state.configData),
      });
      const data = await res.json();
      if (data.error) {
        msg.className = "cfg-msg error";
        msg.textContent = data.error + (data.problems ? ": " + data.problems.join("; ") : "");
      } else {
        msg.className = "cfg-msg ok";
        msg.textContent = data.note || "Saved.";
      }
    } catch (e) {
      msg.className = "cfg-msg error";
      msg.textContent = "Save failed: " + e;
    }
  };

  const restartBtn = document.createElement("button");
  restartBtn.className = "cfg-btn";
  restartBtn.textContent = "Restart services";
  restartBtn.title = "Restarts reolapse-capture and reolapse-web (systemd deployments only) "
    + "so saved changes take effect without a manual restart";
  restartBtn.onclick = async () => {
    if (!confirm("Restart the capture and web services now? The page will briefly disconnect.")) return;
    restartBtn.disabled = true;
    restartBtn.textContent = "Restarting…";
    msg.className = "cfg-msg";
    msg.textContent = "";
    try {
      const res = await fetch("/api/restart", {method: "POST"});
      const data = await res.json();
      if (data.error) {
        msg.className = "cfg-msg error";
        msg.textContent = data.error;
      } else {
        msg.className = "cfg-msg ok";
        msg.textContent = data.note || "Restarting…";
      }
    } catch (e) {
      // The web service restarting itself can drop this very connection -
      // that's the expected outcome here, not a failure.
      msg.className = "cfg-msg ok";
      msg.textContent = "Services restarting — reload the page in a few seconds.";
    }
    restartBtn.disabled = false;
    restartBtn.textContent = "Restart services";
  };

  footer.appendChild(saveBtn);
  footer.appendChild(restartBtn);
  footer.appendChild(msg);
}

function buildSecuritySection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  const enabled = state.authEnabled;
  sec.innerHTML = `<h3>Config page access</h3>
    <div class="cfg-hint-block">${enabled
      ? "A passcode is protecting this page and its network-scan / config-write "
        + "endpoints. Video browsing stays open to anyone on the LAN."
      : "This page can rewrite <code>config.yaml</code> and scan your network, "
        + "but is currently <strong>open to anyone on the LAN</strong>. Set a "
        + "passcode to gate it (video browsing stays open either way)."}
    The passcode is stored only as a salted hash in <code>config.yaml</code> —
    the value you type is never saved anywhere in the clear.</div>`;

  const msg = document.createElement("div");
  msg.className = "cfg-msg";

  const pwInput = document.createElement("input");
  pwInput.type = "password";
  pwInput.placeholder = enabled ? "New passcode" : "Passcode (min 4 chars)";
  pwInput.style.maxWidth = "220px";

  const post = async (payload, confirmText) => {
    if (confirmText && !confirm(confirmText)) return;
    msg.className = "cfg-msg";
    msg.textContent = "Working…";
    try {
      const res = await fetch("/api/auth/passcode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.className = "cfg-msg error";
        msg.textContent = data.error || "Failed.";
        return;
      }
      renderConfig();   // reflect the new locked/open state
    } catch (e) {
      msg.className = "cfg-msg error";
      msg.textContent = "Failed: " + e;
    }
  };

  const setBtn = document.createElement("button");
  setBtn.className = "cfg-btn cfg-btn-primary";
  setBtn.textContent = enabled ? "Change passcode" : "Set passcode";
  setBtn.onclick = () => {
    if (!pwInput.value || pwInput.value.length < 4) {
      msg.className = "cfg-msg error";
      msg.textContent = "Passcode must be at least 4 characters.";
      return;
    }
    post({passcode: pwInput.value},
         enabled ? "Change the passcode? All current sessions will be logged out." : null);
  };

  const row = document.createElement("div");
  row.className = "cfg-login-row";
  row.appendChild(pwInput);
  row.appendChild(setBtn);

  if (enabled) {
    const lockBtn = document.createElement("button");
    lockBtn.className = "cfg-btn";
    lockBtn.textContent = "Lock now";
    lockBtn.title = "Log out this browser; you'll need the passcode again to reopen Config.";
    lockBtn.onclick = async () => {
      try { await fetch("/api/auth/logout", {method: "POST"}); } catch (e) {}
      renderConfig();
    };
    const removeBtn = document.createElement("button");
    removeBtn.className = "cfg-btn cfg-btn-danger";
    removeBtn.textContent = "Remove passcode";
    removeBtn.title = "Disable the gate — the Config page becomes open to anyone on the LAN.";
    removeBtn.onclick = () => post({clear: true},
      "Remove the passcode? The Config page will be open to anyone on the LAN.");
    row.appendChild(lockBtn);
    row.appendChild(removeBtn);
  }

  sec.appendChild(row);
  sec.appendChild(msg);
  return sec;
}

function buildCamerasSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Cameras</h3>
    <div class="cfg-hint-block">Every camera's password is a reference to a
    variable in <code>.env</code>, never a literal value here. Use one
    <code>REOLINK_PASSWORD</code> for everything, or add more variables named
    <code>REOLINK_PASSWORD_&lt;anything&gt;</code> (e.g.
    <code>REOLINK_PASSWORD_NVR</code>, <code>REOLINK_PASSWORD_BACKYARD</code>)
    if your devices use different accounts — each camera below picks which
    one it uses.</div>`;

  const list = document.createElement("div");
  sec.appendChild(list);
  renderCameraCards(list);

  const addBtn = document.createElement("button");
  addBtn.className = "cfg-btn";
  addBtn.style.marginTop = "8px";
  addBtn.textContent = "+ Add camera manually";
  addBtn.onclick = () => {
    if (!state.configData.cameras) state.configData.cameras = [];
    state.configData.cameras.push({
      name: "new-camera", host: "", channel: 0, username: "admin",
      password: "${REOLINK_PASSWORD}", https: true, verify_ssl: false,
    });
    renderCameraCards(list);
  };
  sec.appendChild(addBtn);
  sec.appendChild(buildDiscoverySection(list));
  return sec;
}

function renderCameraCards(list) {
  list.innerHTML = "";
  const cams = state.configData.cameras || [];
  cams.forEach((cam, i) => {
    const card = document.createElement("div");
    card.className = "cfg-camera-card";

    const head = document.createElement("div");
    head.className = "cfg-camera-head";
    const title = document.createElement("strong");
    title.textContent = cam.name || `Camera ${i + 1}`;
    const rm = document.createElement("button");
    rm.className = "cfg-btn cfg-btn-danger";
    rm.textContent = "Remove";
    rm.onclick = () => { cams.splice(i, 1); renderCameraCards(list); };
    head.appendChild(title);
    head.appendChild(rm);
    card.appendChild(head);

    card.appendChild(fieldRow("Name", "Used in folder and file names for this camera's snapshots and "
      + "videos (data/snapshots/<name>/...) — letters, digits, and dashes only, no spaces.",
      textField(`cameras.${i}.name`)));
    card.appendChild(fieldRow("Host", "The device ReoLapse talks to for this camera: either the camera's "
      + "own IP (full resolution, no NVR dependency), or your NVR's IP if you'd rather pull every camera "
      + "through one device and credential.", textField(`cameras.${i}.host`)));
    card.appendChild(fieldRow("Channel", "0 when Host above is the camera itself. When Host is an NVR, "
      + "this is that camera's channel number on it (check the NVR's own UI, or use Discover below).",
      numberField(`cameras.${i}.channel`, {default: 0})));
    card.appendChild(fieldRow("Username", "The login name for this camera/NVR account. A dedicated, "
      + "least-privilege account is safer than reusing your admin login.", textField(`cameras.${i}.username`)));
    card.appendChild(fieldRow("Password", "Which .env variable holds this camera's password. Add the real "
      + "value there — never here. Different cameras can use different variables if they don't share an "
      + "account.", passwordField(`cameras.${i}.password`), true));
    card.appendChild(fieldRow("HTTPS", "Talk to this device over HTTPS instead of plain HTTP. Current "
      + "Reolink firmware generally requires it.", checkboxField(`cameras.${i}.https`, {default: true})));
    card.appendChild(fieldRow("Verify SSL cert", "Checks the device's TLS certificate against trusted "
      + "authorities before trusting it. Leave this off — Reolink devices ship self-signed certificates, "
      + "which would otherwise always fail this check.",
      checkboxField(`cameras.${i}.verify_ssl`, {default: false})));

    if (cam.ptz_home) {
      const hint = document.createElement("div");
      hint.className = "cfg-hint";
      hint.style.marginTop = "6px";
      hint.textContent = "This camera has a PTZ home-position quarantine configured "
        + "— not editable here yet; edit config.yaml directly to change it "
        + "(it will be preserved as-is when you save from this page).";
      card.appendChild(hint);
    }

    list.appendChild(card);
  });
}

function buildDiscoverySection(cameraList) {
  const box = document.createElement("div");
  box.style.marginTop = "16px";
  box.style.borderTop = "1px solid var(--border)";
  box.style.paddingTop = "12px";
  box.innerHTML = `<div class="cfg-hint-block">Scan the local network for
    Reolink cameras/NVRs. This only probes devices — nothing is added to
    your config until you identify one with credentials and click Add.</div>`;

  const scanBtn = document.createElement("button");
  scanBtn.className = "cfg-btn";
  scanBtn.textContent = "Scan network";
  const results = document.createElement("div");
  results.className = "cfg-discover-list";

  scanBtn.onclick = async () => {
    scanBtn.disabled = true;
    scanBtn.textContent = "Scanning…";
    results.innerHTML = "";
    try {
      const res = await fetch("/api/discover", {
        method: "POST", headers: {"Content-Type": "application/json"}, body: "{}",
      });
      const data = await res.json();
      if (!data.found || !data.found.length) {
        results.innerHTML = `<div class="cfg-hint">No Reolink devices found on ${data.subnet}.0/24.</div>`;
      } else {
        data.found.forEach(dev => results.appendChild(buildDiscoveredDeviceItem(dev, cameraList)));
      }
    } catch (e) {
      results.innerHTML = `<div class="cfg-hint">Scan failed: ${e}</div>`;
    }
    scanBtn.disabled = false;
    scanBtn.textContent = "Scan network";
  };

  box.appendChild(scanBtn);
  box.appendChild(results);
  return box;
}

function buildDiscoveredDeviceItem(dev, cameraList) {
  const item = document.createElement("div");
  item.className = "cfg-discover-item";

  const row = document.createElement("div");
  row.className = "cfg-discover-row";
  const label = document.createElement("span");
  label.textContent = `${dev.ip} (${dev.https ? "https" : "http"})`;
  const expandBtn = document.createElement("button");
  expandBtn.className = "cfg-btn";
  expandBtn.textContent = "Identify & add";
  row.appendChild(label);
  row.appendChild(expandBtn);
  item.appendChild(row);

  const detail = document.createElement("div");
  detail.className = "cfg-discover-detail";
  const userInput = document.createElement("input");
  userInput.type = "text";
  userInput.placeholder = "username";
  const passInput = document.createElement("input");
  passInput.type = "password";
  passInput.placeholder = "password";
  detail.appendChild(userInput);
  detail.appendChild(passInput);

  const idBtn = document.createElement("button");
  idBtn.className = "cfg-btn";
  idBtn.textContent = "Identify";
  const idResult = document.createElement("div");
  idResult.style.marginTop = "8px";

  idBtn.onclick = async () => {
    const username = userInput.value, password = passInput.value;
    if (!username || !password) {
      idResult.innerHTML = `<div class="cfg-hint">Enter username and password first.</div>`;
      return;
    }
    idBtn.disabled = true;
    idBtn.textContent = "Identifying…";
    idResult.innerHTML = "";
    try {
      const res = await fetch("/api/discover/identify", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({host: dev.ip, username, password, https: dev.https}),
      });
      const data = await res.json();
      if (data.error) {
        idResult.innerHTML = `<div class="cfg-hint">${data.error}</div>`;
      } else {
        const infoLine = document.createElement("div");
        infoLine.className = "cfg-hint";
        infoLine.textContent = `${data.model || "Unknown model"} — ${data.name || dev.ip}`;
        idResult.appendChild(infoLine);
        const channels = (data.channels && data.channels.length)
          ? data.channels : [{channel: 0, name: data.name || dev.ip}];
        channels.forEach(ch => {
          const addBtn = document.createElement("button");
          addBtn.className = "cfg-btn cfg-btn-primary";
          addBtn.style.marginTop = "6px";
          addBtn.style.marginRight = "6px";
          addBtn.textContent = `Add ch.${ch.channel}${ch.name ? " (" + ch.name + ")" : ""}`;
          addBtn.onclick = () => {
            const slug = (ch.name || `cam-${dev.ip.split(".").pop()}`)
              .toLowerCase().replace(/[^a-z0-9-]+/g, "-").replace(/^-+|-+$/g, "");
            const varName = "REOLINK_PASSWORD_" + slug.toUpperCase().replace(/-/g, "_");
            if (!state.configData.cameras) state.configData.cameras = [];
            state.configData.cameras.push({
              name: slug || `cam-${dev.ip.split(".").pop()}`,
              host: dev.ip, channel: ch.channel, username,
              password: "${" + varName + "}",
              https: dev.https, verify_ssl: false,
            });
            renderCameraCards(cameraList);
            const note = document.createElement("div");
            note.className = "cfg-hint";
            note.style.marginTop = "4px";
            note.textContent = `Added. The password typed above was used only for this `
              + `one-time lookup and isn't saved — set ${varName}=... in your .env file `
              + `before restarting the capture service.`;
            idResult.appendChild(note);
          };
          idResult.appendChild(addBtn);
        });
      }
    } catch (e) {
      idResult.innerHTML = `<div class="cfg-hint">Identify failed: ${e}</div>`;
    }
    idBtn.disabled = false;
    idBtn.textContent = "Identify";
  };
  detail.appendChild(idBtn);
  detail.appendChild(idResult);
  item.appendChild(detail);

  expandBtn.onclick = () => detail.classList.toggle("open");
  return item;
}

function buildCaptureSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Capture</h3>`;
  sec.appendChild(fieldRow("Interval (seconds)", "How often each camera grabs a snapshot. This is the biggest "
    + "lever on both video smoothness and disk use — 60s (one frame/minute) gives a ~48s daily video at 30fps; "
    + "halving it doubles frame count, storage, and video length alike. Minimum 10s — faster polling risks "
    + "overloading the camera/NVR.",
    numberField("capture.interval_seconds", {default: 60, min: 10})));
  sec.appendChild(fieldRow("Auto daylight window",
    "Instead of a fixed clock window, computes actual sunrise/sunset for your location each day and captures "
    + "only within it (plus the buffer below). Useful for cameras that switch to IR/black-and-white at night — "
    + "this keeps those frames out of the timelapse. Overrides Start/End time below when on; needs a location "
    + "(ZIP or lat/lon) set in Weather & astronomy tagging.",
    checkboxField("capture.daylight_window.enabled", {default: false})));
  sec.appendChild(fieldRow("Daylight buffer (minutes)",
    "Widens the auto daylight window by this many minutes on each side — starts capturing this long before "
    + "sunrise, stops this long after sunset. Only matters when Auto daylight window above is on.",
    numberField("capture.daylight_window.buffer_minutes", {default: 0})));
  sec.appendChild(fieldRow("Start time (HH:MM)", "Fixed daily start time for capture, e.g. \"05:30\". Empty "
    + "means capture all day. Ignored whenever Auto daylight window above is on.",
    textField("capture.start_time", {placeholder: "05:30"})));
  sec.appendChild(fieldRow("End time (HH:MM)", "Fixed daily stop time for capture, e.g. \"21:30\". Ignored "
    + "whenever Auto daylight window above is on.",
    textField("capture.end_time", {placeholder: "21:30"})));
  return sec;
}

function buildStorageSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Storage</h3>`;
  sec.appendChild(fieldRow("Keep snapshots (days)",
    "How long to keep a day's raw snapshot images after its daily video has been built. Once a day's video "
    + "exists, its source frames are just disk space — this prunes them after the given number of days so "
    + "storage doesn't grow forever. 0 keeps every snapshot indefinitely.",
    numberField("storage.keep_snapshots_days", {default: 4})));
  return sec;
}

function buildDailyVideoSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Daily video</h3>`;
  sec.appendChild(fieldRow("Frame rate (fps)", "Playback speed of the rendered video, in frames per second. "
    + "Doesn't change how many snapshots are captured — just how quickly they play back. Higher fps means a "
    + "shorter, faster-paced video from the same day's frames.",
    numberField("daily_video.fps", {default: 30})));
  sec.appendChild(fieldRow("Quality (CRF)", "x264's Constant Rate Factor — the main video quality/file-size "
    + "knob, roughly logarithmic: lower numbers mean higher quality and bigger files, higher numbers mean more "
    + "compression artifacts and smaller files. There's no fixed unit; each step up or down roughly halves or "
    + "doubles the file size. 18-23 is the commonly recommended \"visually lossless to very good\" range for "
    + "x264 — 18 looks close to the source but costs more disk, 23 is noticeably more compressed but much "
    + "smaller. This project defaults to 20 as a middle ground.",
    numberField("daily_video.crf", {default: 20})));
  sec.appendChild(fieldRow("Encode preset", "x264's speed-vs-compression tradeoff during encoding. Slower "
    + "presets (toward veryslow) spend more CPU time finding a smaller file at the same Quality (CRF) above; "
    + "faster presets (toward ultrafast) encode quicker but produce a larger file for the same quality. This "
    + "only affects encode time and file size — not the frame rate or resolution of the result. \"medium\" is "
    + "ffmpeg's own default and a reasonable starting point.",
    selectField("daily_video.preset", X264_PRESETS, {default: "medium"})));
  sec.appendChild(fieldRow("Deflicker window", "Number of neighboring frames averaged together to smooth out "
    + "brightness flicker between snapshots (common with auto-exposure cameras, especially at dawn/dusk or in "
    + "changing cloud cover). Larger windows smooth more but can blur fast lighting changes; 0 disables "
    + "deflickering entirely.",
    numberField("daily_video.deflicker_size", {default: 10})));
  sec.appendChild(fieldRow("Max height (px)", "Downscales the video if the source snapshots are taller than "
    + "this, preserving aspect ratio — reduces file size and encode time for high-resolution cameras. 0 keeps "
    + "the original snapshot resolution untouched.",
    numberField("daily_video.max_height", {default: 0})));
  sec.appendChild(fieldRow("Retention (days)", "Deletes a camera's daily video this many days after its date. "
    + "Unlike snapshots, a pruned daily video can't be rebuilt later — by the time it's pruned, its source "
    + "frames are normally already gone too (see Keep snapshots above). 0 keeps every daily video forever.",
    numberField("daily_video.retention_days", {default: 0})));
  return sec;
}

function buildYearlySection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Yearly video</h3>`;
  sec.appendChild(fieldRow("Start after (days)", "Hold off rendering the yearly video until this many distinct "
    + "days have been archived. A couple of days makes a pointless ~2-second clip, so the default waits until "
    + "there's enough footage to be worth watching. 0 renders as soon as any frames exist. (Building is otherwise "
    + "a weekly job; this just gates it early on.)",
    numberField("yearly.min_days_before_render", {default: 30})));
  sec.appendChild(fieldRow("Archive frames/day", "How many frames per day get pulled aside into a permanent "
    + "archive (separate from the daily snapshots, which get pruned per Storage above). This archive is the "
    + "pool the yearly video is selected from, and is never automatically deleted — archive more than you plan "
    + "to render so you can re-tune Video frames/day below later without losing options.",
    numberField("yearly.archive_frames_per_day", {default: 24})));
  sec.appendChild(fieldRow("Video frames/day", "How many of each day's archived frames actually get used in "
    + "the rendered yearly video — must be less than or equal to Archive frames/day above. E.g. 10/day for a "
    + "365-day year at 30fps renders to about a 2-minute video.",
    numberField("yearly.video_frames_per_day", {default: 10})));
  sec.appendChild(fieldRow("Daylight window", "Restricts which hours of the day are eligible for the yearly "
    + "video, as \"HH:MM-HH:MM\" (e.g. \"08:00-16:30\"), so it doesn't pull dark or IR night frames year-round. "
    + "Empty uses the whole day.",
    textField("yearly.video_window", {placeholder: "08:00-16:30"})));
  sec.appendChild(fieldRow("Frame rate (fps)", "Playback speed of the rendered yearly video, in frames per "
    + "second — same idea as Daily video's Frame rate above.", numberField("yearly.fps", {default: 30})));
  sec.appendChild(fieldRow("Quality (CRF)", "x264 quality for the yearly video — same scale as Daily video's "
    + "Quality (CRF) above: lower is higher quality and bigger file, higher is more compressed and smaller.",
    numberField("yearly.crf", {default: 20})));
  sec.appendChild(fieldRow("Encode preset", "x264 encode speed vs. compression for the yearly video — same "
    + "tradeoff as Daily video's Encode preset above.",
    selectField("yearly.preset", X264_PRESETS, {default: "medium"})));
  sec.appendChild(fieldRow("Deflicker window", "Frames averaged to smooth exposure flicker in the yearly "
    + "video — same idea as Daily video's Deflicker window above, just wider by default since exposure varies "
    + "more day-to-day than minute-to-minute.", numberField("yearly.deflicker_size", {default: 15})));
  sec.appendChild(fieldRow("Retention (years)",
    "Deletes a camera's rendered yearly video once it's older than this many years. The archived frames it "
    + "was built from (see Archive frames/day above) are never deleted by this, so a pruned yearly video can "
    + "always be regenerated later — safe to set low. 0 keeps every yearly video forever.",
    numberField("yearly.retention_years", {default: 0})));
  return sec;
}

function buildEventsSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Weather &amp; astronomy tagging</h3>`;

  sec.appendChild(fieldRow("Storm/snow/rain tagging", "Polls NWS alerts (US only) and Open-Meteo for active "
    + "storm/snow/rain conditions, tags matching frames, and can switch capture to the faster Burst interval "
    + "below while a Burst tag is active. Requires a location (ZIP or lat/lon, set below) — if left on without "
    + "one, this tagging is silently skipped and a warning is logged.",
    checkboxField("events.weather_enabled", {default: false})));
  sec.appendChild(fieldRow("Moon event tagging", "Computes real moon events locally (via Skyfield): full, "
    + "blue, and harvest moon, plus blood moon (total lunar eclipse) and partial lunar eclipse. No location "
    + "required — moon phase is the same instant everywhere on Earth; a location is only used to skip tagging "
    + "an eclipse when the Moon isn't actually above your horizon. First use downloads a ~17 MB ephemeris file.",
    checkboxField("events.lunar_enabled", {default: false})));
  sec.appendChild(fieldRow("Season tagging", "Tags every frame and video with the current astronomical season "
    + "(spring/summer/fall/winter). No location required — defaults to Northern Hemisphere; set a location "
    + "below to get correct seasons south of the equator.",
    checkboxField("events.season_enabled", {default: false})));

  const hasLatLon = cfgGet("events.latitude", null) != null;
  const modeRow = document.createElement("div");
  modeRow.className = "cfg-row cfg-row-col";
  const modeLabel = document.createElement("div");
  modeLabel.className = "cfg-label";
  modeLabel.textContent = "Location";
  const radioGroup = document.createElement("div");
  radioGroup.className = "cfg-radio-group";
  const zipRadioLabel = document.createElement("label");
  const zipRadio = document.createElement("input");
  zipRadio.type = "radio"; zipRadio.name = "locmode"; zipRadio.value = "zip";
  zipRadio.checked = !hasLatLon;
  zipRadioLabel.appendChild(zipRadio);
  zipRadioLabel.appendChild(document.createTextNode(" US ZIP code"));
  const latRadioLabel = document.createElement("label");
  const latRadio = document.createElement("input");
  latRadio.type = "radio"; latRadio.name = "locmode"; latRadio.value = "latlon";
  latRadio.checked = hasLatLon;
  latRadioLabel.appendChild(latRadio);
  latRadioLabel.appendChild(document.createTextNode(" Latitude/longitude"));
  radioGroup.appendChild(zipRadioLabel);
  radioGroup.appendChild(latRadioLabel);
  modeRow.appendChild(modeLabel);
  modeRow.appendChild(radioGroup);
  sec.appendChild(modeRow);

  const zipRow = fieldRow("ZIP code", "US ZIP code, resolved to latitude/longitude via zippopotam.us (free, "
    + "no API key). Used by Storm/snow/rain tagging (required), and optionally by Moon event and Season "
    + "tagging above and Auto daylight window in Capture.",
    textField("events.zip", {placeholder: "12345"}));
  const latRow = fieldRow("Latitude", "Decimal degrees (e.g. 38.7906). Use this instead of ZIP code if you're "
    + "outside the US, or want to skip the ZIP lookup.", numberField("events.latitude", {step: "0.0001"}));
  const lonRow = fieldRow("Longitude", "Decimal degrees (e.g. -89.8339). Paired with Latitude above.",
    numberField("events.longitude", {step: "0.0001"}));
  zipRow.style.display = hasLatLon ? "none" : "flex";
  latRow.style.display = hasLatLon ? "flex" : "none";
  lonRow.style.display = hasLatLon ? "flex" : "none";
  sec.appendChild(zipRow);
  sec.appendChild(latRow);
  sec.appendChild(lonRow);

  zipRadio.onchange = () => {
    if (!zipRadio.checked) return;
    zipRow.style.display = "flex"; latRow.style.display = "none"; lonRow.style.display = "none";
    cfgSet("events.latitude", null);
    cfgSet("events.longitude", null);
  };
  latRadio.onchange = () => {
    if (!latRadio.checked) return;
    zipRow.style.display = "none"; latRow.style.display = "flex"; lonRow.style.display = "flex";
    cfgSet("events.zip", null);
  };

  sec.appendChild(fieldRow("Poll interval (minutes)", "How often to check NWS alerts and Open-Meteo for "
    + "current weather conditions. Only relevant when Storm/snow/rain tagging above is on.",
    numberField("events.poll_minutes", {default: 5})));
  sec.appendChild(fieldRow("Burst interval (seconds)", "Capture interval used instead of the normal "
    + "Capture > Interval (seconds) while any tag below is active — pick a value that evenly divides the "
    + "normal interval so timing stays predictable, e.g. 10s bursts within a 60s normal interval.",
    numberField("events.burst_interval_seconds", {default: 10, min: 10})));
  sec.appendChild(fieldRow("Burst tags", "Which active tags switch capture to the faster Burst interval above "
    + "— e.g. capture more frequently during an actual storm so the event clip (see Event video clips below) "
    + "has enough footage.",
    tagCheckGroup("events.burst_tags", ["storm", "snow", "rain"]), true));

  return sec;
}

function buildEventsVideoSection() {
  const sec = document.createElement("div");
  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Event video clips</h3>`;
  sec.appendChild(fieldRow("Tags that get their own clip", "Each night, any contiguous span of frames sharing "
    + "one of these active tags gets rendered into its own short clip (separate from the daily/yearly videos) "
    + "— e.g. a dedicated video for each storm. Any tag works here, including moon phases and seasons, not "
    + "just weather.",
    tagCheckGroup("events_video.tags", EVENT_TAGS), true));
  sec.appendChild(fieldRow("Minimum frames", "Skips rendering a clip for a tagged span shorter than this many "
    + "frames — filters out brief blips (e.g. a storm alert that clears in a couple of minutes) that wouldn't "
    + "make a meaningful clip.",
    numberField("events_video.min_frames", {default: 30})));
  sec.appendChild(fieldRow("Frame rate (fps)", "Playback speed of event clips, in frames per second — same "
    + "idea as Daily video's Frame rate.", numberField("events_video.fps", {default: 30})));
  sec.appendChild(fieldRow("Quality (CRF)", "x264 quality for event clips — same scale as Daily video's "
    + "Quality (CRF): lower is higher quality and bigger file, higher is more compressed and smaller.",
    numberField("events_video.crf", {default: 20})));
  sec.appendChild(fieldRow("Encode preset", "x264 encode speed vs. compression for event clips — same "
    + "tradeoff as Daily video's Encode preset.",
    selectField("events_video.preset", X264_PRESETS, {default: "medium"})));
  sec.appendChild(fieldRow("Deflicker window",
    "Frames averaged to smooth exposure flicker in event clips. Defaults to 0 (off) here specifically because "

  sec.appendChild(fieldRow("Retention (days)", "Deletes an event clip this many days after the date in its "

function buildWebappSection() {

  sec.className = "cfg-section";
  sec.innerHTML = `<h3>Web UI</h3>`;
  sec.appendChild(fieldRow("Host", "Network interface this web UI listens on. 0.0.0.0 listens on every "
    + "interface, making it reachable from other devices on your network — use 127.0.0.1 to restrict it to "
    + "this machine only. Takes effect on restart (see Restart services below).",
    textField("webapp.host", {default: "0.0.0.0"})));
  sec.appendChild(fieldRow("Port", "TCP port this web UI listens on. Takes effect on restart (see Restart "
    + "services below).", numberField("webapp.port", {default: 8080})));

  const colorRow = document.createElement("div");
  colorRow.className = "cfg-row cfg-row-col";
  const colorLabel = document.createElement("div");
  colorLabel.className = "cfg-label";
  colorLabel.textContent = "Accent color";
  const swatchGroup = document.createElement("div");
  swatchGroup.className = "swatch-radio";

  state.accentColors.forEach(name => {
