<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReoLapse</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml">
<style>
  :root {
    /* Surfaces */
    --surface-0: #14161a;
    --surface-1: #1d2026;
    --surface-2: #24282f;
    /* Borders */
    --border: #30343c;
    --border-strong: #3d424c;
    /* Text */
    --text-1: #e8eaed;
    --text-2: #9aa0a8;
    --text-3: #6b7280;
    /* Brand accent, from the logo's sun */
    --accent: #f2a94e;
    --accent-strong: #f79a3e;
    --accent-contrast: #14161a;
    --accent-quiet: rgba(242, 169, 78, 0.14);
    /* Typography */
    --font-sans: system-ui, "Segoe UI", Roboto, sans-serif;
    --fs-xs: 12px;
    --fs-sm: 13px;
    --fs-base: 15px;
    --fs-lg: 17px;
    --lh: 1.5;
    --fw-regular: 400;
    --fw-medium: 500;
    --fw-semibold: 600;
    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    /* Radii */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 10px;
    --radius-pill: 999px;
    /* Motion & layout */
    --transition: 120ms ease;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--surface-0);
    color: var(--text-1);
    font: var(--fs-base)/var(--lh) var(--font-sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: var(--space-3) var(--space-5);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .brand { display: flex; align-items: center; gap: var(--space-2); }
  .brand img { width: 26px; height: 26px; display: block; }
  .brand h1 {
    margin: 0;
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
    letter-spacing: 0.2px;
  }

  .pills { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .pill {
    padding: var(--space-1) var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-sm)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), background var(--transition), border-color var(--transition);
  }
  .pill:hover { color: var(--text-1); border-color: var(--border-strong); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
    font-weight: var(--fw-medium);
  }

  main { flex: 1; display: flex; min-height: 0; }

  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: var(--space-2);
  }
  .vid-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
  }
  .vid-item:hover { background: var(--surface-1); }
  .vid-item.active { background: var(--accent-quiet); color: var(--accent); }
  .vid-item .size { color: var(--text-2); font-size: var(--fs-xs); white-space: nowrap; }

  #player-area {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-5);
  }
  video {
    max-width: 100%;
    max-height: calc(100% - 60px);
    border-radius: var(--radius-lg);
    background: #000;
  }

  #controls {
    margin-top: var(--space-3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    flex-wrap: wrap;
  }
  #controls .label { color: var(--text-2); font-size: var(--fs-sm); }
  .speed {
    padding: var(--space-1) var(--space-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-1);
    color: var(--text-2);
    font: var(--fw-regular) var(--fs-xs)/1 var(--font-sans);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
  }
  .speed:hover { color: var(--text-1); border-color: var(--border-strong); }
  .speed.active { color: var(--accent); border-color: var(--accent); }
  a.dl { color: var(--text-2); font-size: var(--fs-sm); text-decoration: none; }
  a.dl:hover { color: var(--accent); }

  #empty { color: var(--text-2); text-align: center; padding: var(--space-6); line-height: 1.6; }
  #empty code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-size: var(--fs-sm);
  }

  #warnings:empty { display: none; }
  .warning {
    padding: var(--space-2) var(--space-5);
    background: var(--accent-quiet);
    color: var(--accent);
    font-size: var(--fs-sm);
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 700px) {
    main { flex-direction: column; }
    #sidebar {
      width: 100%;
      max-height: 40%;
      border-right: none;
      border-top: 1px solid var(--border);
      order: 2;
    }
    #player-area { order: 1; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="/static/logo.svg" alt="">
    <h1>ReoLapse</h1>
  </div>
  <div class="pills" id="cameras"></div>
  <div class="pills" id="types">
    <button class="pill active" data-type="daily">Daily</button>
    <button class="pill" data-type="yearly">Yearly</button>
    <button class="pill" data-type="events">Events</button>
  </div>
</header>
<div id="warnings"></div>
<main>
  <div id="sidebar"></div>
  <div id="player-area">
    <div id="empty">Loading&hellip;</div>
  </div>
</main>
<script>
let state = { videos: [], camera: null, type: "daily", current: null };

async function load() {
  const res = await fetch("/api/videos");
  const data = await res.json();
  state.videos = data.videos;

  const warnBox = document.getElementById("warnings");
  warnBox.innerHTML = "";
  (data.warnings || []).forEach(w => {
    const div = document.createElement("div");
    div.className = "warning";
    div.textContent = w;
    warnBox.appendChild(div);
  });

  const camBox = document.getElementById("cameras");
  camBox.innerHTML = "";
  data.cameras.forEach((cam, i) => {
    const b = document.createElement("button");
    b.className = "pill" + (i === 0 ? " active" : "");
    b.textContent = cam;
    b.onclick = () => { state.camera = cam; setActive(camBox, b); renderList(); };
    camBox.appendChild(b);
  });
  state.camera = data.cameras[0] || null;
  renderList();
}

function setActive(container, btn) {
  container.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
}

document.getElementById("types").addEventListener("click", e => {
  if (!e.target.dataset.type) return;
  state.type = e.target.dataset.type;
  setActive(document.getElementById("types"), e.target);
  renderList();
});

function renderList() {
  const list = state.videos.filter(v => v.camera === state.camera && v.type === state.type);
  const box = document.getElementById("sidebar");
  box.innerHTML = "";
  list.forEach(v => {
    const div = document.createElement("div");
    div.className = "vid-item";
    div.innerHTML = `<span>${v.label}</span><span class="size">${v.size_mb} MB</span>`;
    div.onclick = () => play(v, div);
    box.appendChild(div);
  });
  if (list.length) {
    play(list[0], box.firstChild);
  } else {
    document.getElementById("player-area").innerHTML =
      `<div id="empty">No ${state.type} videos yet${state.camera ? " for " + state.camera : ""}.<br>
       Run <code>build_timelapse.py</code> to create some.</div>`;
    state.current = null;
  }
}

function play(v, itemEl) {
  state.current = v;
  document.querySelectorAll(".vid-item").forEach(el => el.classList.remove("active"));
  if (itemEl) itemEl.classList.add("active");
  const area = document.getElementById("player-area");
  area.innerHTML = `
    <video controls autoplay muted src="${v.url}"></video>
    <div id="controls">
      <span class="label">${v.camera} &middot; ${v.label}</span>
      <span class="label">Speed:</span>
      ${[0.5, 1, 2, 4].map(s =>
        `<button class="speed${s === 1 ? " active" : ""}" data-speed="${s}">${s}&times;</button>`).join("")}
      <a class="dl" href="${v.url}" download>download</a>
    </div>`;
  area.querySelectorAll(".speed").forEach(b => {
    b.onclick = () => {
      area.querySelector("video").playbackRate = parseFloat(b.dataset.speed);
      area.querySelectorAll(".speed").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    };
  });
}

load();
</script>
</body>
</html>
